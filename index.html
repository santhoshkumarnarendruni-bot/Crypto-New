<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Decision Engine v5.3</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080c10;--card:#0f1820;--card2:#0d1520;--border:#1a2535;--border2:#1f2d3d;
  --text:#d4dce8;--muted:#7f8c9a;--yes:#2ecc71;--no:#e74c3c;--warn:#f39c12;
  --info:#f1c40f;--conf:#3498db;--skip:#7f8c9a;
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,Arial,sans-serif;font-size:14px;}
body{padding:10px;max-width:480px;margin:auto;}

/* ── Controls ── */
.ctrl-row{display:flex;gap:6px;align-items:stretch;margin-top:6px;}
select,input{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:9px 10px;font-size:14px;width:100%;}
button{background:#1a7a42;border:none;color:#fff;font-weight:700;border-radius:6px;padding:9px 12px;font-size:14px;cursor:pointer;white-space:nowrap;}
button:active{opacity:.8;}
.btn-auto{background:#1a3a6a;}
.btn-auto.on{background:#7a3a1a;}
.btn-refresh{background:#1a4a6a;width:40px;flex-shrink:0;font-size:16px;}
.ctrl-row select{flex:1;}

/* ── Status bar ── */
.status-bar{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-top:8px;overflow:hidden;font-size:12px;}
.sb-item{flex:1;padding:5px 6px;border-right:1px solid var(--border);min-width:0;}
.sb-item:last-child{border-right:none;}
.sb-label{color:var(--muted);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-val{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Mini chart ── */
#miniChart{display:block;width:100%;height:48px;border-radius:6px;background:var(--card2);margin-top:6px;}

/* ── Status/error text ── */
.status-txt{font-size:11px;color:var(--muted);margin-top:4px;min-height:14px;}
.error-txt{font-size:11px;color:var(--no);margin-top:4px;min-height:14px;line-height:1.4;}

/* ── Signal Colors ── */
.yes{color:var(--yes);font-weight:700;} .no{color:var(--no);font-weight:700;}
.skip{color:var(--skip);font-weight:700;} .warn{color:var(--warn);font-weight:700;}
.info{color:var(--info);} .conf{color:var(--conf);font-weight:700;}
.small{font-size:11px;color:var(--muted);}

/* ── Decision Card (always visible) ── */
.decision-card{border:2px solid var(--info);border-radius:10px;padding:12px 14px;margin-top:8px;background:#0c1408;line-height:1.6;}
.decision-card.yes-card{border-color:var(--yes);background:#071208;}
.decision-card.no-card{border-color:var(--no);background:#120707;}
.decision-big{font-size:26px;font-weight:800;letter-spacing:.5px;line-height:1.1;}
.conf-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;font-size:13px;align-items:center;}
.conf-pill{background:rgba(255,255,255,.06);border-radius:5px;padding:2px 8px;font-size:13px;}
.alert-strip{border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px;font-weight:700;line-height:1.4;}
.alert-strip.yes{background:#061a0e;border:1px solid var(--yes);color:var(--yes);}
.alert-strip.no{background:#1a0606;border:1px solid var(--no);color:var(--no);}
.alert-strip.warn{background:#1a1000;border:1px solid var(--warn);color:var(--warn);}
.alert-strip.info{background:#1a1600;border:1px solid var(--info);color:var(--info);}

/* ── Quick stats grid ── */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.q-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.q-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.q-val{font-size:15px;font-weight:700;margin-top:1px;}
.q-sub{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── Price row ── */
.price-row{display:flex;align-items:baseline;gap:8px;margin-top:6px;flex-wrap:wrap;}
.price-big{font-size:20px;font-weight:700;}
.price-diff{font-size:13px;font-weight:700;}
.price-target{font-size:13px;color:var(--muted);}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-top:10px;overflow:hidden;}
.tab-btn{flex:1;padding:9px 4px;font-size:12px;font-weight:600;color:var(--muted);background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;transition:all .15s;}
.tab-btn:last-child{border-right:none;}
.tab-btn.active{background:var(--card);color:var(--text);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── Inside tabs ── */
.row-item{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.row-item:last-child{border-bottom:none;}
.row-label{color:var(--muted);font-size:12px;}
.section{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;}
.section-title{font-size:13px;font-weight:700;margin-bottom:6px;}
.prob-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px;}
.prob-cell{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 8px;text-align:center;}
.prob-cell .label{font-size:10px;color:var(--muted);}
.prob-cell .val{font-size:15px;font-weight:700;margin-top:1px;}
.tick-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.tick-chip{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px;font-weight:600;}
table{width:100%;border-collapse:collapse;margin-top:4px;font-size:12px;}
td,th{border-bottom:1px solid var(--border);padding:5px 6px;text-align:left;vertical-align:top;}
th{color:var(--info);font-size:11px;}
.scalp-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;margin-bottom:6px;}
.scalp-badge.yes{background:#0a2010;border:1px solid var(--yes);color:var(--yes);}
.scalp-badge.no{background:#200a0a;border:1px solid var(--no);color:var(--no);}
.scalp-badge.warn{background:#201000;border:1px solid var(--warn);color:var(--warn);}
.scalp-badge.skip{background:#141414;border:1px solid var(--skip);color:var(--skip);}

/* ── Inline alert cards (micro/scalp/cushion shown on main screen) ── */
.inline-alert{border-radius:8px;padding:8px 11px;margin-top:6px;font-size:12px;line-height:1.5;}
.inline-alert.yes{background:#061a0e;border:1px solid var(--yes);}
.inline-alert.no{background:#1a0606;border:1px solid var(--no);}
.inline-alert.warn{background:#1a1000;border:1px solid var(--warn);}
.inline-alert.skip{background:#111820;border:1px solid var(--border);}
.inline-alert-title{font-weight:700;font-size:13px;margin-bottom:2px;}
.inline-alert-sub{color:var(--muted);font-size:11px;}

/* ── Compact exchange strip ── */
.exch-strip{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:6px;}
.exch-cell{flex:1;padding:6px 8px;border-right:1px solid var(--border);min-width:0;}
.exch-cell:last-child{border-right:none;}
.exch-cell-label{font-size:10px;color:var(--muted);}
.exch-cell-val{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Tick chips wrap tighter ── */
.tick-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tick-chip{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:11px;font-weight:600;}
</style>

<body>

<!-- ── Header ── -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">

<canvas id="miniChart"></canvas>

<!-- ── Result area ── -->
<div id="result"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
function $(id){ return document.getElementById(id); }
function setText(id, v){ const e=$(id); if(e) e.textContent = v; }
function setHTML(id, v){ const e=$(id); if(e) e.innerHTML = v; }
function setClass(id, c){ const e=$(id); if(e) e.className = c; }
function clamp(x, lo, hi){ return Math.max(lo, Math.min(hi, x)); }
function showErr(m){ const e=$("errorMsg"); if(e) e.textContent = m||""; }
function clearErr(){ showErr(""); }

async function fetchJ(url, timeout=5000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), timeout);
  try{
    const r = await fetch(url,{cache:"no-store",signal:ctrl.signal});
    if(!r.ok) throw new Error("HTTP "+r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}

// ═══════════════════════════════════════════════════════════════
// KALSHI CONFIG
// ═══════════════════════════════════════════════════════════════
const KALSHI_SERIES = {
  "BTC-USD":"KXBTC15M","ETH-USD":"KXETH15M","SOL-USD":"KXSOL15M",
  "XRP-USD":"KXXRP15M","DOGE-USD":"KXDOGE15M","BNB-USD":null
};
let latestKalshi = null;
let autoTimer = null;

// ═══════════════════════════════════════════════════════════════
// TICK ENGINE
// ═══════════════════════════════════════════════════════════════
const TICK_PERIODS = [5, 10, 30];

const tickStore = {
  ticks: [],
  candles5s:  [],
  candles10s: [],
  candles30s: [],
  openCandle: null,
  openPeriod: 10,
  maxTicks: 600,
  maxCandles: 120,

  push(price, side, volume){
    const now = Date.now();
    this.ticks.push({price, time: now, side: side||"unknown", volume: volume||0});
    if(this.ticks.length > this.maxTicks) this.ticks.shift();
    this._aggregate(this.candles5s,  5000,  now, price, volume);
    this._aggregate(this.candles10s, 10000, now, price, volume);
    this._aggregate(this.candles30s, 30000, now, price, volume);
  },

  _aggregate(arr, periodMs, now, price, volume){
    const boundary = Math.floor(now / periodMs) * periodMs;
    const last = arr[arr.length-1];
    if(last && last.boundary === boundary){
      last.high   = Math.max(last.high, price);
      last.low    = Math.min(last.low, price);
      last.close  = price;
      last.volume += (volume||0);
      last.count++;
    } else {
      arr.push({ boundary, open:price, high:price, low:price, close:price, volume:volume||0, count:1 });
      if(arr.length > this.maxCandles) arr.shift();
    }
  },

  getCandles(period){
    if(period===5)  return this.candles5s;
    if(period===10) return this.candles10s;
    return this.candles30s;
  },

  getRecentCloses(period, n){
    const arr = this.getCandles(period);
    return arr.slice(-n).map(c=>c.close);
  },

  tickVWAP(windowMs = 180000){
    const now = Date.now();
    const cutoff = now - windowMs;
    let pv = 0, w = 0;
    for(const t of this.ticks){
      if(t.time < cutoff) continue;
      const age = (now - t.time) / windowMs;
      const weight = Math.exp(-age * 2);
      pv += t.price * weight;
      w  += weight;
    }
    return w > 0 ? pv/w : 0;
  },

  flowRatio(n=30){
    const slice = this.ticks.slice(-n);
    if(!slice.length) return { ratio: 0.5, buys: 0, sells: 0, signal: "WAITING", cls: "skip" };
    const buys  = slice.filter(t=>t.side==="buy").length;
    const sells = slice.filter(t=>t.side==="sell").length;
    const total = slice.length;
    const ratio = buys / total;
    let signal = "NEUTRAL FLOW", cls = "skip";
    if(ratio >= 0.70){ signal = "STRONG BUY FLOW"; cls = "yes"; }
    else if(ratio >= 0.60){ signal = "BUY PRESSURE"; cls = "yes"; }
    else if(ratio <= 0.30){ signal = "STRONG SELL FLOW"; cls = "no"; }
    else if(ratio <= 0.40){ signal = "SELL PRESSURE"; cls = "no"; }
    return { ratio, buys, sells, total, signal, cls };
  }
};

// ═══════════════════════════════════════════════════════════════
// ORDER BOOK ENGINE
// ═══════════════════════════════════════════════════════════════
const bookStore = {
  bids: new Map(),
  asks: new Map(),
  lastMid: 0,

  applySnapshot(bids, asks){
    this.bids.clear(); this.asks.clear();
    for(const [p,s] of bids) this.bids.set(+p, +s);
    for(const [p,s] of asks) this.asks.set(+p, +s);
    this._updateMid();
  },

  applyUpdate(changes){
    for(const [side, price, size] of changes){
      const map = side==="buy" ? this.bids : this.asks;
      const p = +price, s = +size;
      if(s === 0) map.delete(p); else map.set(p, s);
    }
    this._updateMid();
  },

  _updateMid(){
    const topBid = this.bids.size ? Math.max(...this.bids.keys()) : 0;
    const topAsk = this.asks.size ? Math.min(...this.asks.keys()) : 0;
    if(topBid && topAsk) this.lastMid = (topBid+topAsk)/2;
  },

  imbalance(pct=0.003){
    if(!this.lastMid) return { ratio:0.5, signal:"WAITING", cls:"skip", bidDepth:0, askDepth:0 };
    const lo = this.lastMid*(1-pct), hi = this.lastMid*(1+pct);
    let bidD=0, askD=0;
    for(const [p,s] of this.bids) if(p>=lo) bidD+=s;
    for(const [p,s] of this.asks) if(p<=hi) askD+=s;
    const total = bidD+askD;
    if(!total) return { ratio:0.5, signal:"NO DATA", cls:"skip", bidDepth:0, askDepth:0 };
    const ratio = bidD/total;
    let signal="BALANCED BOOK", cls="skip";
    if(ratio>=0.65){ signal="HEAVY BID WALL"; cls="yes"; }
    else if(ratio>=0.58){ signal="BID SIDE HEAVIER"; cls="yes"; }
    else if(ratio<=0.35){ signal="HEAVY ASK WALL"; cls="no"; }
    else if(ratio<=0.42){ signal="ASK SIDE HEAVIER"; cls="no"; }
    return { ratio, signal, cls, bidDepth:bidD, askDepth:askD };
  }
};

// ═══════════════════════════════════════════════════════════════
// KALSHI VELOCITY TRACKER
// ═══════════════════════════════════════════════════════════════
const kalshiVel = {
  history: [],
  maxLen: 10,

  push(yesMid){
    const now = Date.now();
    this.history.push({time:now, yesMid});
    if(this.history.length > this.maxLen) this.history.shift();
  },

  velocity(n=4){
    const slice = this.history.slice(-Math.min(n, this.history.length));
    if(slice.length < 2) return 0;
    const first=slice[0], last=slice[slice.length-1];
    const mins = Math.max(0.017, (last.time - first.time)/60000);
    return ((last.yesMid - first.yesMid) * 100) / mins;
  },

  lagSignal(currentPrice, lastSnapshotPrice){
    const vel = this.velocity();
    const priceDeltaPct = lastSnapshotPrice>0 ? Math.abs((currentPrice-lastSnapshotPrice)/lastSnapshotPrice)*100 : 0;
    const kalshiMoving = Math.abs(vel) >= 3.0;
    const priceStill = priceDeltaPct < 0.05;

    if(kalshiMoving && priceStill){
      return { signal: vel>0 ? "KALSHI REPRICING UP (AHEAD OF PRICE)" : "KALSHI REPRICING DOWN (AHEAD OF PRICE)",
               cls: vel>0?"yes":"no", vel, type:"kalshi_leads" };
    }
    if(!kalshiMoving && priceDeltaPct >= 0.07){
      return { signal: currentPrice>lastSnapshotPrice ? "KALSHI LAGGING BULLISH MOVE" : "KALSHI LAGGING BEARISH MOVE",
               cls: currentPrice>lastSnapshotPrice?"yes":"no", vel, type:"price_leads" };
    }
    return { signal: Math.abs(vel)>1?"Slow repricing ("+vel.toFixed(1)+" pts/min)":"Kalshi in sync", cls:"skip", vel, type:"sync" };
  },

  persistentLag(currentPrice){
    if(this.history.length < 3) return false;
    const oldest = this.history[0];
    const latestYes = this.history[this.history.length-1].yesMid;
    const kalshiMove = Math.abs((latestYes - oldest.yesMid)*100);
    return kalshiMove < 2.0;
  }
};

let kalshiBgTimer = null;
async function startKalshiBgPoller(){
  if(kalshiBgTimer) clearInterval(kalshiBgTimer);
  kalshiBgTimer = setInterval(async ()=>{
    const product = $("coin").value;
    const k = await fetchKalshiViaProxy(product);
    if(k && k.yesMid !== null){
      kalshiVel.push(k.yesMid);
      latestKalshi = k;
      const yesPct = (k.yesMid*100).toFixed(1);
      const vel = kalshiVel.velocity();
      const velStr = vel>=0.5?` ▲${vel.toFixed(1)}`:vel<=-0.5?` ▼${Math.abs(vel).toFixed(1)}`:` →`;
      setText("tbKalshi", `YES ${yesPct}%${velStr}`);
      setClass("tbKalshi", vel>=2?"yes":vel<=-2?"no":"skip");
      if($("market") && !$("market").dataset.manualEdit){
        $("market").value = k.yesMid.toFixed(4);
      }
    }
  }, 12000);
}

// ═══════════════════════════════════════════════════════════════
// BTC REFERENCE FEED
// ═══════════════════════════════════════════════════════════════
const btcRef = {
  price: null,
  prevPrice: null,
  trend: 0,
  update(p){
    if(this.price) this.trend = p - this.price;
    this.prevPrice = this.price;
    this.price = p;
  },
  correlation(coinTrend5){
    if(!this.price || this.trend===0) return { signal:"NO BTC DATA", cls:"skip", boost:0 };
    const agree = (this.trend>0 && coinTrend5>0)||(this.trend<0 && coinTrend5<0);
    const disagree = (this.trend>0 && coinTrend5<0)||(this.trend<0 && coinTrend5>0);
    if(agree) return { signal:"BTC CONFIRMS DIRECTION", cls: this.trend>0?"yes":"no", boost:6 };
    if(disagree) return { signal:"BTC DIVERGING — CAUTION", cls:"warn", boost:-8 };
    return { signal:"BTC NEUTRAL", cls:"skip", boost:0 };
  }
};
let btcSocket = null;

function startBtcFeed(){
  if($("coin").value==="BTC-USD") return;
  try{ if(btcSocket) btcSocket.close(); }catch(e){}
  try{
    btcSocket = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");
    btcSocket.onmessage = e=>{
      try{ const d=JSON.parse(e.data); if(d.p) btcRef.update(+d.p); }catch(err){}
    };
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════
// FUTURES PREMIUM
// ═══════════════════════════════════════════════════════════════
const futuresPrem = { premium:0, signal:"—", cls:"skip", lastUpdate:0 };
let futuresTimer = null;

async function fetchFuturesPremium(product){
  const map={"BTC-USD":"BTCUSDT","ETH-USD":"ETHUSDT","SOL-USD":"SOLUSDT","XRP-USD":"XRPUSDT","DOGE-USD":"DOGEUSDT","BNB-USD":"BNBUSDT"};
  const sym = map[product];
  if(!sym) return;
  try{
    const d = await fetchJ(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${sym}`, 4000);
    const mark=+d.markPrice, index=+d.indexPrice;
    if(!mark||!index) return;
    const pct = ((mark-index)/index)*100;
    futuresPrem.premium = pct;
    futuresPrem.lastUpdate = Date.now();
    if(pct > 0.04){      futuresPrem.signal="FUTURES BULLISH PREM"; futuresPrem.cls="yes"; }
    else if(pct > 0.015){ futuresPrem.signal="MILD BULL PREMIUM";   futuresPrem.cls="yes"; }
    else if(pct < -0.04){ futuresPrem.signal="FUTURES BEARISH DISC"; futuresPrem.cls="no"; }

let liveState = {
  coinbase: null, fastPrice: null, fastSource:"—",
  leader:"WAITING", lagScore:0, spread:0, spreadPct:0,
  status:"Starting...", lastUpdate:0
};

function dynThreshold(product){
  return ["DOGE-USD","XRP-USD"].includes(product) ? {strong:0.035,weak:0.015} : {strong:0.020,weak:0.007};
}

function updateLeader(product){
  if(!liveState.coinbase || !liveState.fastPrice) return;
  liveState.spread = liveState.fastPrice - liveState.coinbase;
  liveState.spreadPct = (liveState.spread/liveState.coinbase)*100;
  const {strong,weak} = dynThreshold(product);
  const p = Math.abs(liveState.spreadPct);
  if(p > strong){
    liveState.leader = liveState.fastSource+(liveState.spread>0?" leading UP":" leading DOWN");
    liveState.lagScore = 3;
  } else if(p > weak){
    liveState.leader = "Small "+liveState.fastSource+" lead";
    liveState.lagScore = 1;
  } else {
    liveState.leader = "No clear leader";
    liveState.lagScore = 0;
  }
  updateStatusBar();
}

function updateStatusBar(){
  const f=liveState;
  if(f.coinbase){ setText("tbCoinbase", f.coinbase.toFixed(2)); setClass("tbCoinbase","sb-val info"); }
  if(f.coinbase && f.fastPrice){
    const lagTxt = f.lagScore>=3 ? "⚡LAG "+f.lagScore+"/3" : f.lagScore>=1 ? "~lag" : "synced";
    setText("tbSpread", lagTxt);
    setClass("tbSpread","sb-val "+(f.lagScore>=3?"warn":f.lagScore>=1?"info":"skip"));
  }
  // flow+OB combined
  const flow=tickStore.flowRatio(30);
  const book=bookStore.imbalance(0.003);
  const flowOB = flow.cls!=="skip" ? flow.signal.replace("STRONG ","").replace(" FLOW","").replace(" PRESSURE","") :
                 book.cls!=="skip" ? book.signal.replace("HEAVY ","").replace(" WALL","").replace(" SIDE HEAVIER","") : "—";
  const cls2 = flow.cls!=="skip" ? flow.cls : book.cls;
  setText("tbFlowOB", flowOB);
  setClass("tbFlowOB","sb-val "+cls2);
}

function drawMiniChart(){
  const canvas = $("miniChart"); if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 48 * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const w=rect.width, h=48;
  const ticks = tickStore.ticks.slice(-100);
  if(ticks.length<2){ ctx.clearRect(0,0,w,h); return; }
  const prices = ticks.map(t=>t.price);
  const mn=Math.min(...prices), mx=Math.max(...prices);
  const range=mx-mn||1;
  ctx.clearRect(0,0,w,h);
  const target = +$("target").value;
  if(target>0 && target>=mn && target<=mx){
    const ty = h-((target-mn)/range)*(h-10)-5;
    ctx.strokeStyle="#f1c40f44"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(0,ty); ctx.lineTo(w,ty); ctx.stroke();
    ctx.setLineDash([]);
  }
  const lastP = prices[prices.length-1];
  const col = lastP > (target||0) ? "#2ecc71" : "#e74c3c";
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath();
  prices.forEach((p,i)=>{
    const x=i/(prices.length-1)*w;
    const y=h-((p-mn)/range)*(h-10)-5;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,col+"44"); grad.addColorStop(1,col+"00");
  ctx.fillStyle=grad;
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath(); ctx.fill();
}

function kalshiUrl(series){
  return `https://api.elections.kalshi.com/trade-api/v2/markets?series_ticker=${series}&status=open&limit=5`;
}

function parseKalshi(text){
  try{
    const data = typeof text==="string"?JSON.parse(text):text;
    if(!data.markets?.length) return null;
    const m = data.markets.slice().sort((a,b)=>new Date(a.close_time)-new Date(b.close_time))[0];
    const strike = m.floor_strike??m.strike_value??m.cap_strike??null;
    if(strike===null) return null;
    const toFrac=(dStr,cInt)=>{ if(dStr!=null&&dStr!=="") return +dStr; if(cInt!=null&&cInt!=="") return cInt/100; return null; };
    const yesBid=toFrac(m.yes_bid_dollars??m.yes_bid_dollar, m.yes_bid);
    const yesAsk=toFrac(m.yes_ask_dollars??m.yes_ask_dollar, m.yes_ask);
    const lastP =toFrac(m.last_price_dollars??m.last_price_dollar, m.last_price);
    const mid = (yesBid!=null&&yesAsk!=null)?(yesBid+yesAsk)/2:(lastP??yesBid);
    return {target:+strike, ticker:m.ticker, closeTime:m.close_time, yesBid, yesAsk, yesMid:mid, noMid:mid==null?null:1-mid};
  }catch(e){ return null; }
}

async function fetchKalshiViaProxy(product){
  const series=KALSHI_SERIES[product]; if(!series) return null;
  const enc=encodeURIComponent(kalshiUrl(series));
  const attempts=[
    ()=>fetchJ(`https://api.allorigins.win/get?url=${enc}`,3500).then(j=>parseKalshi(j.contents)),
    ()=>fetchJ(`https://corsproxy.io/?url=${enc}`,3500).then(j=>parseKalshi(JSON.stringify(j))),
    ()=>fetchJ(`https://api.codetabs.com/v1/proxy?quest=${enc}`,3500).then(j=>parseKalshi(j))
  ];
  try{
    return await Promise.any(attempts.map(fn=>fn().then(x=>{ if(!x) throw new Error("null"); return x; })));
  }catch(e){ return null; }
}

// ═══════════════════════════════════════════════════════════════
// TECHNICAL INDICATORS
// ═══════════════════════════════════════════════════════════════
function RSI(closes){
  if(closes.length<2) return 50;
  const period=Math.min(14,closes.length-1);
  let g=0,l=0;
  for(let i=1;i<=period;i++){ const d=closes[i]-closes[i-1]; d>0?g+=d:l-=d; }
  let ag=g/period, al=l/period;
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;
    al=(al*(period-1)+(d<0?-d:0))/period;
  }
  return 100-(100/(1+(al===0?100:ag/al)));
}

function EMA(values, period){
  if(!values.length) return 0;
  const k=2/(period+1);
  const seedLen=Math.min(period,values.length);
  let ema=values.slice(0,seedLen).reduce((a,b)=>a+b,0)/seedLen;
  for(let i=seedLen;i<values.length;i++) ema=values[i]*k+ema*(1-k);
  return ema;
}

function VOL(closes){
  let s=0; for(let i=1;i<closes.length;i++) s+=Math.abs(closes[i]-closes[i-1]);
  return s/Math.max(1,closes.length-1);
}

function decayVWAP(candles, halfLifeCandles=15){
  let pv=0,v=0; const n=candles.length;
  candles.forEach((c,i)=>{
    const typical=(c.high+c.low+c.close)/3;
    const age=n-1-i;
    const weight=Math.exp(-age*Math.log(2)/halfLifeCandles);
    pv+=typical*c.volume*weight; v+=c.volume*weight;
  });
  return v?pv/v:candles[candles.length-1].close;
}

function plainVWAP(candles){
  let pv=0,v=0;
  candles.forEach(c=>{ const t=(c.high+c.low+c.close)/3; pv+=t*c.volume; v+=c.volume; });
  return v?pv/v:candles[candles.length-1].close;
}

function avgVol(candles){ return candles.reduce((s,c)=>s+c.volume,0)/Math.max(1,candles.length); }

function momentumAccel(candles){
  if(candles.length<6) return {signal:"NONE",cls:"skip",detail:"—",accel:0};
  const last3=candles.slice(-3), prev3=candles.slice(-6,-3);
  const lastMove=last3[last3.length-1].close-last3[0].open;
  const prevMove=prev3[prev3.length-1].close-prev3[0].open;
  const accel=lastMove-prevMove;
  const lastVol=last3.reduce((s,c)=>s+c.volume,0);
  const prevVol=prev3.reduce((s,c)=>s+c.volume,0);
  const volRatio=prevVol>0?lastVol/prevVol:1;
  const ref=candles[candles.length-1].close||1;
  const pct=Math.abs(lastMove/ref)*100;
  if(pct>=0.07&&volRatio>=1.35){
    if(lastMove>0&&prevMove>=0) return {signal:"BULLISH ACCELERATION",cls:"yes",detail:`+${pct.toFixed(3)}% 3c, vol×${volRatio.toFixed(1)}`,accel};
    if(lastMove<0&&prevMove<=0) return {signal:"BEARISH ACCELERATION",cls:"no", detail:`${pct.toFixed(3)}% drop 3c, vol×${volRatio.toFixed(1)}`,accel};
    return {signal:"REVERSAL SURGE",cls:"warn",detail:`Reversal vol×${volRatio.toFixed(1)}`,accel};
  }
  if(pct>=0.04&&volRatio>=1.15)
    return {signal:lastMove>0?"MILD BULL PUSH":"MILD BEAR PUSH",cls:lastMove>0?"yes":"no",detail:`${pct.toFixed(3)}% vol×${volRatio.toFixed(1)}`,accel};
  return {signal:"NONE",cls:"skip",detail:"No accel",accel};
}

function htfBias(price, candles){
  const closes=candles.map(c=>c.close);
  const getPAgo=(m)=>{ const t=Date.now()-m*60000; return candles.reduce((p,c)=>Math.abs(c.time-t)<Math.abs(p.time-t)?c:p).close; };
  const p30=getPAgo(30),p60=getPAgo(60),p120=getPAgo(120);
  const last60=candles.slice(-60);
  const vwap60=plainVWAP(last60.length?last60:candles);
  const ema60=EMA(closes.slice(-90),60);
  const high60=Math.max(...(last60.length?last60:candles).map(c=>c.high));
  const low60 =Math.min(...(last60.length?last60:candles).map(c=>c.low));
  const latest=candles[candles.length-1];
  const range60=Math.max(0.000001,high60-low60);
  const rangePos=((price-low60)/range60)*100;
  const avgVol60=avgVol((last60.length?last60:candles).slice(0,-1));
  const volSpike60=latest.volume>avgVol60*1.5;
  const upperWickPct=(latest.high-Math.max(latest.open,latest.close))/Math.max(0.000001,latest.high-latest.low);
  const lowerWickPct=(Math.min(latest.open,latest.close)-latest.low)/Math.max(0.000001,latest.high-latest.low);
  const t30=price-p30, t60=price-p60, t120=price-p120;
  let score=0;
  if(t30>0)score++;else score--;
  if(t60>0)score++;else score--;
  if(t120>0)score++;else score--;
  if(price>vwap60)score++;else score--;
  if(price>ema60)score++;else score--;
  if(volSpike60&&score>0)score++;
  if(volSpike60&&score<0)score--;
  if(upperWickPct>0.45)score--;
  if(lowerWickPct>0.45)score++;
  let suggestion="HTF BIAS: NEUTRAL / WAIT", cls="skip";
  if(score>=4){ suggestion="HTF BIAS: YES SIDE — confirm 15m"; cls="yes"; }
  else if(score<=-4){ suggestion="HTF BIAS: NO SIDE — confirm 15m"; cls="no"; }
  const extendedMove=Math.abs(t60)>Math.max(VOL(closes.slice(-30))*6,price*0.0015);
  const wickWarn=upperWickPct>0.45?"Upper wick YES danger":lowerWickPct>0.45?"Lower wick NO danger":"No major wick warning";
  return {score,suggestion,cls,trend30:t30,trend60:t60,trend120:t120,vwap60,ema60,high60,low60,rangePos,volumeSpike60:volSpike60,extendedMove,wickWarning:wickWarn};
}

function getTimeLeft(){

  return Math.max(0,(Math.floor(Date.now()/fifteen)*fifteen+fifteen-Date.now())/60000);

function projectedSettlement(price, latestAvg, trend5, trend10, trend15, timeLeft){

  return (latestAvg*(0.65+urgency*0.25)) + (price*(0.35-urgency*0.25)) + (trendProj*0.12);
}

const fairHistory = [];
function trackFairDivergence(fairYes, marketYes){
  const now=Date.now();
  fairHistory.push({time:now, edge: fairYes-marketYes});
  if(fairHistory.length>6) fairHistory.shift();
  if(fairHistory.length<2) return {signal:"—",cls:"skip",earlyEntry:false};
  const first=fairHistory[0].edge, last=fairHistory[fairHistory.length-1].edge;
  const widening=Math.abs(last)>Math.abs(first);
  const consistent=fairHistory.every(h=>Math.sign(h.edge)===Math.sign(last));
  if(consistent && Math.abs(last)>=0.06 && widening){
    const side=last>0?"YES":"NO";
    return {signal:`EARLY ENTRY: ${side} MISPRICING WIDENING (${(Math.abs(last)*100).toFixed(1)} pts)`,cls:last>0?"yes":"no",earlyEntry:true,edge:last};
  }
  if(consistent && Math.abs(last)>=0.08){
    return {signal:`MISPRICING HOLD: ${last>0?"YES":"NO"} edge ${(Math.abs(last)*100).toFixed(1)} pts`,cls:last>0?"yes":"no",earlyEntry:false,edge:last};
  }
  return {signal:"No sustained divergence",cls:"skip",earlyEntry:false,edge:last};
}

function applyConfirm(product, rawDecision, timing){
  const ks="sig_"+product, kc="sigC_"+product;
  const last=localStorage.getItem(ks);
  let cnt=+(localStorage.getItem(kc)||0);
  if(rawDecision===last && rawDecision!=="SKIP" && rawDecision!=="WATCH ONLY") cnt++;
  else cnt=1;
  localStorage.setItem(ks,rawDecision); localStorage.setItem(kc,cnt);
  if((rawDecision==="BET YES"||rawDecision==="BET NO")&&cnt<2)
    return {decision:"WATCH ONLY",cls:"skip",timing:"WAIT — 2 CONFIRMATIONS NEEDED",confirmationCount:cnt};
  return {decision:rawDecision,cls:rawDecision==="BET YES"?"yes":rawDecision==="BET NO"?"no":"skip",timing,confirmationCount:cnt};
}

function vwapOverride({price,target,vwap,vol,trend5,trend10,yesProb,noProb,timeLeft}){
  const cushion=price-target, absCush=Math.abs(cushion);
  const weak=absCush<vol*2.0, veryStrong=absCush>vol*2.5;
  const aboveT=price>target,belowT=price<target,aboveV=price>vwap,belowV=price<vwap;
  const t5b=trend5<0,t10b=trend10<0,t5u=trend5>0,t10u=trend10>0;
  const t10sp=trend10>80, t10sn=trend10<-80;
  let signal="NO SPECIAL VWAP OVERRIDE",action="FOLLOW NORMAL ENGINE",cls="skip",confidenceBoost=0,reason="Use normal decision engine.";
  if(aboveT&&weak&&belowV&&t5b&&t10b&&timeLeft>5&&yesProb>65){ signal="BEARISH OVERRIDE → BET NO";action="BET NO";cls="no";confidenceBoost=18;reason="Above target, below VWAP, both bearish — possible bull trap."; }
  else if(yesProb>65&&t5b&&t10b&&belowV){ signal="BULL TRAP DETECTED";action="BET NO or WAIT";cls="no";confidenceBoost=12;reason="High YES prob but below VWAP + bearish trends."; }
  else if(belowT&&weak&&aboveV&&t5u&&t10u&&timeLeft>5&&noProb>65){ signal="BULLISH OVERRIDE → BET YES";action="BET YES";cls="yes";confidenceBoost=18;reason="Below target, above VWAP, both bullish — possible bear trap."; }
  else if(noProb>65&&t5u&&t10u&&aboveV){ signal="BEAR TRAP DETECTED";action="BET YES or WAIT";cls="yes";confidenceBoost=12;reason="High NO prob but above VWAP + bullish trends."; }
  if(action.includes("NO")&&t10sp&&!belowV){ signal="AVOID NO";action="WAIT";cls="warn";confidenceBoost=-10;reason="10m strongly positive + above VWAP — NO is unsafe."; }
  if(action.includes("YES")&&t10sn&&!aboveV){ signal="AVOID YES";action="WAIT";cls="warn";confidenceBoost=-10;reason="10m strongly negative + below VWAP — YES is unsafe."; }
  return {signal,action,cls,confidenceBoost,reason,cushion,weakCushion:weak,veryStrongCushion:veryStrong};
}

function exchangePressure(cbP, secondP, t5, t10, mktYes, mktNo){
  const spread=secondP-cbP, pct=cbP?(spread/cbP)*100:0;
  let pressure="NEUTRAL",cls="skip",reason="No major exchange pressure.";

  return {spread,spreadPct:pct,pressure,cls,reason};
}

    scalpEntry=`NO ≤${(mktNo*100).toFixed(1)}% near target`;
    scalpExit=`TP ${(clamp(mktNo+0.12,0,0.95)*100).toFixed(0)}–${(clamp(mktNo+0.20,0,0.95)*100).toFixed(0)}¢`;
    scalpStop="Exit if price breaks above target.";scalpReason="NO cheap + near target + pullback signal.";
  }
  const tooClose=Math.abs(proj-target)<vol;
  const earlyWindow=timeLeft>6, idealWindow=timeLeft<=6&&timeLeft>=3, lateWindow=timeLeft<2;
  let rawDecision="SKIP", timing=confidence>=70?"ENTER IF SIGNAL HOLDS":"WAIT";
  if(confidence<60||volVeryHigh||tooClose||targetMagnet){ rawDecision="SKIP"; timing="AVOID / WAIT"; }
  else if(diverg.earlyEntry&&confidence>=60&&timeLeft>6){ rawDecision=diverg.edge>0?"BET YES":"BET NO"; timing="EARLY ENTRY — DIVERGENCE"; }
  else if(earlyWindow){ rawDecision="WATCH ONLY"; timing=earlyBias!=="NO EARLY BIAS"?"EARLY BIAS — WAIT FOR 6–3 MIN":"TOO EARLY — WAIT"; }
  else if(idealWindow&&confidence>=65&&yes>=0.66&&yesScore>=7&&avgCushion>=cushionThresh*1.25&&price>target&&latestAvg>target&&proj>target&&ema9>ema21&&price>vwap&&latestGreen){ rawDecision="BET YES"; timing="IDEAL ENTRY WINDOW"; }
  else if(idealWindow&&confidence>=65&&no>=0.66&&noScore>=7&&avgCushion<=-cushionThresh*1.25&&price<target&&latestAvg<target&&proj<target&&ema9<ema21&&price<vwap&&latestRed){ rawDecision="BET NO"; timing="IDEAL ENTRY WINDOW"; }
  else if(lateWindow&&confidence>=70&&Math.abs(avgCushion)>=cushionThresh*2&&((yes>no&&yesScore>=7)||(no>yes&&noScore>=7))){ rawDecision=yes>no?"BET YES":"BET NO"; timing="LATE ENTRY — LOWER RETURN"; }
  else { rawDecision="SKIP"; timing="WAIT"; }
  const confirmed=applyConfirm(product,rawDecision,timing);
  return {
    yes,no,confidence,mktYes,mktNo,
    decision:confirmed.decision,cls:confirmed.cls,timing:confirmed.timing,confirmationCount:confirmed.confirmationCount,
    reasons,warnings,trend5,trend10,trend15,t5pos,t10pos,t15pos,
    ema9,ema21,vwap,vwapPlain,rsi,vol,yesScore,noScore,
    proj,avgCushion,cushionThresh,targetMagnet,
    cushionSignal,cushionClass,cushionReason,
    earlyBias,earlyBiasClass,rsiSignal,rsiClass,htf,momentum,
    flow,book,btcCorr,velSig,persLag,futuresPrem:{...futuresPrem},override,
    scalpSignal,scalpClass,scalpAction,scalpEntry,scalpExit,scalpStop,scalpReason,
    fairYes,fairNo,edgeYes,edgeNo,mispricingSide,mispricingClass,mispricingLabel,
    lagScore,lagClass,lagLabel,priceMovePct,marketMovePts,secondsSince,
    repricingSpeed,repricingLabel,repricingClass,
    microScore,microReasons,microSignal,microCls,microAction,exitPlan,diverg,
    volumeSpike,averageVolume:avgVol(recent30),latestVolume:latest.volume,
    latestGreen,latestRed,latestAvg,timeLeft,tick
  };
}

// AUTO REFRESH
// ═══════════════════════════════════════════════════════════════
function toggleAutoRefresh(){
  const btn=$("btnAuto");
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; btn.textContent="Auto OFF"; btn.className="btn-auto"; return; }
  const sec=+$("autoRefreshSec").value||20;
  btn.textContent=`Auto ON (${sec}s)`; btn.className="btn-auto on";
  autoTimer=setInterval(()=>run(true),sec*1000);
  run(true);
}

// MAIN RUN
// ═══════════════════════════════════════════════════════════════
async function run(silent=false){
  const savedY=window.scrollY;
  const product=$("coin").value;
  const resultEl=$("result");
  clearErr();

  if(!silent||!resultEl.innerHTML.trim()){
    resultEl.innerHTML=`<div style="color:var(--muted);padding:12px;text-align:center;font-size:13px;">Loading data...</div>`;
  }
  if($("refreshStatus")) $("refreshStatus").innerHTML="⟳";

  await refreshKalshiTarget(silent);
  const target=+$("target").value;
  const marketInput=+$("market").value;

  if(!target||isNaN(target)){
    showErr("No target — Kalshi pull failed. Enter manually.");
    return;
  }

  try{
    const [candles, secondTicker] = await Promise.all([
      getRestCandles(product, 60),
      fetchSecondRest(product)
    ]);

    if(candles.length<30) throw new Error("Not enough candles");

    let price;
    if(liveState.coinbase && Date.now()-liveState.lastUpdate < 8000){
      price = liveState.coinbase;
    } else {
      price = await getRestTicker(product);
      tickStore.push(price,"unknown",0);
    }

    if(!liveState.fastPrice && secondTicker.ok){
      liveState.fastPrice = secondTicker.price;
      liveState.fastSource = secondTicker.source+" REST";
      updateLeader(product);
    }

    const closes=candles.slice(-30).map(c=>c.close);
    const latest=candles[candles.length-1];
    const latestAvg=(latest.open+latest.high+latest.low+latest.close)/4;
    const getPAgo=(m)=>{ const t=Date.now()-m*60000; return candles.reduce((p,c)=>Math.abs(c.time-t)<Math.abs(p.time-t)?c:p).close; };
    const p5=getPAgo(5), p10=getPAgo(10), p15=getPAgo(15);

    const r=analyzeV5({product,price,target,marketInput,candles,restCandles:candles,p5,p10,p15,latestAvg,secondPrice:secondTicker.ok?secondTicker.price:null});
    const exchPress=exchangePressure(price,secondTicker.ok?secondTicker.price:price,r.trend5,r.trend10,r.mktYes,r.mktNo);

    resultEl.innerHTML=renderResult(r,price,target,p5,p10,p15,product,secondTicker,exchPress);

    if($("refreshStatus")) $("refreshStatus").innerHTML=`✓ ${new Date().toLocaleTimeString()}`;

  }catch(e){
    console.error(e);
    if(silent&&resultEl.innerHTML.trim()){
      if($("refreshStatus")) $("refreshStatus").innerHTML="⚠ retry...";
      showErr(e.message);
    } else {
      showErr("Error: "+e.message);
      resultEl.innerHTML=`<div style="color:var(--muted);padding:12px;font-size:13px;">No result — waiting for data.</div>`;
    }
  } finally {
    setTimeout(()=>window.scrollTo(0,savedY),0);
  }
}

window.addEventListener("DOMContentLoaded",()=>{
  // Resize canvas properly
  const canvas=$("miniChart");
  if(canvas){ canvas.style.width="100%"; canvas.style.height="48px"; }

  startAllSockets();
  startKalshiBgPoller();
  refreshKalshiTarget(false);

  $("market").addEventListener("input",()=>{ $("market").dataset.manualEdit="1"; });

  $("coin").addEventListener("change",async()=>{
    $("result").innerHTML="";
    $("market").value=""; $("market").dataset.manualEdit="";
    $("target").value="";
    clearErr(); latestKalshi=null;
    kalshiVel.history.length=0; fairHistory.length=0;
    tickStore.ticks.length=0; tickStore.candles5s.length=0;
    tickStore.candles10s.length=0; tickStore.candles30s.length=0;
    bookStore.bids.clear(); bookStore.asks.clear();
    localStorage.removeItem("sig_"+$("coin").value);
    localStorage.removeItem("sigC_"+$("coin").value);
    startAllSockets();
    startKalshiBgPoller();
    await refreshKalshiTarget(false);
  });
});
