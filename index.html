// KALSHI TRADING API
// ═══════════════════════════════════════════════════════════════
// Kalshi REST API v2 base
const KALSHI_API = "https://api.elections.kalshi.com/trade-api/v2";
let kalshiToken  = "";   // session token (from login)
let kalshiEmail  = "";
let openPositions = [];

function getKalshiHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + kalshiToken
  };
}

async function kalshiLogin(email, password) {
  setTradeStatus("pending", "Logging in to Kalshi...");
  try {
    const r = await fetch(`${KALSHI_API}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.message || "Login failed");
    kalshiToken = d.token || d.access_token || "";
    kalshiEmail = email;
    localStorage.setItem("kalshi_token", kalshiToken);
    localStorage.setItem("kalshi_email", email);
    setTradeStatus("ok", `✓ Logged in as ${email}`);
    setText("loginBtnLabel", "✓ Connected");
    $("loginBtn").style.background="#1a7a42";
    await loadPositions();
  } catch(e) {
    kalshiToken = "";
    setTradeStatus("err", "Login failed: " + e.message);
  }
}

async function kalshiOrder(ticker, side, count, price) {
  // side: "yes" or "no"
  // price: in cents (integer 1-99)
  // count: number of contracts
  if(!kalshiToken) { setTradeStatus("err", "Not logged in. Enter credentials first."); return; }
  setTradeStatus("pending", `Placing ${side.toUpperCase()} order: ${count} contracts @ ${price}¢...`);
  try {
    const body = {
      ticker,
      client_order_id: "dce_" + Date.now(),
      type: "limit",
      action: "buy",
      side,
      count,
      yes_price: side==="yes" ? price : 100-price,
      no_price:  side==="no"  ? price : 100-price,
      expiration_ts: null
    };
    const r = await fetch(`${KALSHI_API}/portfolio/orders`, {
      method: "POST",
      headers: getKalshiHeaders(),
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.message || JSON.stringify(d));
    setTradeStatus("ok", `✓ Order placed! Order ID: ${d.order?.order_id||d.order_id||"—"}\n${count} ${side.toUpperCase()} contracts @ ${price}¢ on ${ticker}`);
    await loadPositions();
  } catch(e) {
    setTradeStatus("err", "Order failed: " + e.message);
  }
}

async function kalshiSellPosition(ticker, side, count) {
  if(!kalshiToken) { setTradeStatus("err", "Not logged in."); return; }
  setTradeStatus("pending", `Selling ${count} ${side.toUpperCase()} contracts on ${ticker}...`);
  try {
    // Sell = buy the opposite side at market
    // Get current market price first
    const mktR = await fetch(`${KALSHI_API}/markets/${ticker}`, { headers: getKalshiHeaders() });
    const mktD = await mktR.json();
    const mkt = mktD.market;
    const sellPrice = side==="yes"
      ? Math.round((mkt.yes_bid||0.5)*100)
      : Math.round((mkt.no_bid||0.5)*100);

    const body = {
      ticker,
      client_order_id: "dce_sell_" + Date.now(),
      type: "limit",
      action: "sell",
      side,
      count,
      yes_price: side==="yes" ? sellPrice : 100-sellPrice,
      no_price:  side==="no"  ? sellPrice : 100-sellPrice,
      expiration_ts: null
    };
    const r = await fetch(`${KALSHI_API}/portfolio/orders`, {
      method: "POST",
      headers: getKalshiHeaders(),
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.message || JSON.stringify(d));
    setTradeStatus("ok", `✓ Sell order placed! ${count} ${side.toUpperCase()} contracts @ ${sellPrice}¢`);
    await loadPositions();
  } catch(e) {
    setTradeStatus("err", "Sell failed: " + e.message);
  }
}

async function loadPositions() {
  if(!kalshiToken) return;
  try {
    const r = await fetch(`${KALSHI_API}/portfolio/positions?count=20`, { headers: getKalshiHeaders() });
    if(!r.ok) return;
    const d = await r.json();
    openPositions = (d.market_positions || []).filter(p => (p.position||0) !== 0);
    renderPositions();
  } catch(e) {}
}

function renderPositions() {
  const el = $("positionsList");
  if(!el) return;
  if(!openPositions.length) { el.innerHTML=`<div class="small" style="margin-top:6px;">No open positions.</div>`; return; }
  el.innerHTML = openPositions.map(p => {
    const side = (p.position||0) > 0 ? "yes" : "no";
    const count = Math.abs(p.position||0);
    const avgCost = ((p.total_cost||0)/100/count).toFixed(2);
    const currentPnl = p.realized_pnl !== undefined ? ((p.realized_pnl||0)/100).toFixed(2) : "—";
    return `<div class="pos-item">
      <div>
        <div style="font-weight:700;">${(p.ticker||"").split("-").slice(-2).join("-")}</div>
        <div class="small">${count} ${side.toUpperCase()} @ ${avgCost} · PnL: <span class="${currentPnl>0?"yes":currentPnl<0?"no":"skip"}">$${currentPnl}</span></div>
      </div>
      <button class="sell-btn" onclick="kalshiSellPosition('${p.ticker}','${side}',${count})">Sell</button>
    </div>`;
  }).join("");
}

function setTradeStatus(type, msg) {
  const el = $("tradeStatus");
  if(!el) return;
  el.className = "trade-status " + type;
  el.innerHTML = msg.replace(/\n/g,"<br>");
}

function doTrade(side) {
  const ticker = latestKalshi?.ticker || "";
  if(!ticker) { setTradeStatus("err","No Kalshi market loaded. Click Analyze first."); return; }
  const count = parseInt($("tradeQty")?.value || "0");
  const priceInput = parseFloat($("tradePrice")?.value || "0");
  if(count < 1)  { setTradeStatus("err","Enter number of contracts (min 1)."); return; }
  if(priceInput <= 0 || priceInput > 99) { setTradeStatus("err","Enter a valid price in cents (1–99)."); return; }
  kalshiOrder(ticker, side.toLowerCase(), count, Math.round(priceInput));
}

// Called by the new Place Order UI — reads amount+side, confirms, then submits
function doTradeFromOrder(buttonSide) {
  const orderSideEl = $("orderSide");
  const side = orderSideEl ? orderSideEl.value : buttonSide;
  const qty   = parseInt($("tradeQty")?.value   || "0");
  const price = parseInt($("tradePrice")?.value  || "0");
  if(qty < 1 || price < 1) {
    setTradeStatus("err", "Enter a dollar amount first so contracts can be calculated.");
    return;
  }
  const ticker = latestKalshi?.ticker || "";
  if(!ticker) { setTradeStatus("err","No Kalshi market loaded. Click Analyze first."); return; }
  kalshiOrder(ticker, side.toLowerCase(), qty, price);
}

// Recalculates everything from dollar amount + side, updates summary card + hidden inputs
function updateOrderCalc() {
  const amtEl    = $("orderAmount");
  const sideEl   = $("orderSide");
  if(!amtEl || !sideEl) return;

  const stake = parseFloat(amtEl.value) || 0;
  const side  = sideEl.value; // "YES" or "NO"

  // Get current market ask price for chosen side
  const mktYes = window._lastMktYes || (latestKalshi?.yesMid ?? 0.5);
  const mktNo  = window._lastMktNo  || (1 - (latestKalshi?.yesMid ?? 0.5));
  const pricePerContract = side === "YES" ? mktYes : mktNo;

  // Reset if no data
  if(!pricePerContract || pricePerContract <= 0 || pricePerContract >= 1 || stake <= 0) {
    ["oContracts","oPrice","oTotalCost","oWinPayout","oNetProfit","oFee","oLeftover","oBreakEven"]
      .forEach(id => { const e=$(id); if(e){ e.textContent="—"; e.className=""; } });
    return;
  }

  const contracts  = Math.floor(stake / pricePerContract);
  if(contracts < 1) {
    const e=$("oContracts"); if(e){ e.textContent="0"; e.style.color="var(--no)"; }
    const p=$("oPrice"); if(p) p.textContent=(pricePerContract*100).toFixed(0)+"¢";
    const c=$("oTotalCost"); if(c){ c.textContent="Need $"+(pricePerContract).toFixed(2)+"+"; }
    ["oWinPayout","oNetProfit","oFee","oLeftover"].forEach(id=>{const e=$(id);if(e)e.textContent="—";});
    const be=$("oBreakEven");if(be)be.textContent="Enter a larger amount to buy at least 1 contract.";
    return;
  }

  const actualCost = contracts * pricePerContract;
  const leftover   = stake - actualCost;

  // Fees
  const buyFee     = Math.min(0.07 * contracts, 0.03 * actualCost);
  const totalIn    = actualCost + buyFee;

  // Win scenario: each contract pays $1
  const winGross   = contracts * 1.00;
  const sellFee    = Math.min(0.07 * contracts, 0.03 * winGross);
  const winNet     = winGross - sellFee - totalIn;
  const winROI     = (winNet / totalIn) * 100;
  const feeTotal   = buyFee + sellFee;

  // Break-even
  const breakEven  = (totalIn + sellFee) / contracts;

  // Update DOM
  const setEl = (id, txt, cls) => {
    const e=$(id); if(!e) return;
    e.textContent = txt;
    if(cls) e.className = cls;
  };

  setEl("oContracts", contracts,                               "");
  setEl("oPrice",     (pricePerContract*100).toFixed(1)+"¢",  side==="YES"?"yes":"no");
  setEl("oTotalCost", "$"+totalIn.toFixed(2),                  "");
  setEl("oWinPayout", "$"+winGross.toFixed(2),                 "yes");
  setEl("oNetProfit", (winNet>=0?"+":""  )+"$"+winNet.toFixed(2)+(` (${winROI.toFixed(1)}%)`), winNet>=0?"yes":"no");
  setEl("oFee",       "$"+feeTotal.toFixed(3)+" round-trip",  "warn");

  const beEl = $("oBreakEven");
  if(beEl) beEl.textContent = `Break-even: ${(breakEven*100).toFixed(1)}¢ per contract`;

  const priceEl = $("tradePrice"); if(priceEl)  priceEl.value = Math.round(pricePerContract * 100);

// SESSION LOGGER
// ═══════════════════════════════════════════════════════════════
const LOG_KEY      = "dce_log_v1";
const LOG_MAX_AGE  = 48 * 60 * 60 * 1000;   // 48 hours
const LOG_MAX_ROWS = 5000;

function logGetAll() {
  try { return JSON.parse(localStorage.getItem(LOG_KEY) || "[]"); }
  catch(e) { return []; }
}
function logSave(rows) {
  try { localStorage.setItem(LOG_KEY, JSON.stringify(rows)); }
  catch(e) {
    // If storage full, drop oldest 20% and retry
    const trimmed = rows.slice(Math.floor(rows.length * 0.2));
    try { localStorage.setItem(LOG_KEY, JSON.stringify(trimmed)); } catch(e2) {}
  }
}

function logAppend(row) {
  const now = Date.now();
  let rows = logGetAll();
  // Purge rows older than 48h
  rows = rows.filter(r => (now - r.ts) < LOG_MAX_AGE);
  // Cap total rows
  if(rows.length >= LOG_MAX_ROWS) rows = rows.slice(rows.length - LOG_MAX_ROWS + 1);
  rows.push(row);
  logSave(rows);
}

function logClearOld() {
  const now = Date.now();
  const rows = logGetAll().filter(r => (now - r.ts) < LOG_MAX_AGE);
  logSave(rows);
}

function logClearAll() {
  if(!confirm("Delete ALL logged data? This cannot be undone.")) return;
  localStorage.removeItem(LOG_KEY);
  renderLogTab();
}

// Build one log row from analyzeV5 result
function buildLogRow(r, price, target, product) {
  const now = Date.now();
  const boundary = Math.floor(now / (15*60*1000)) * (15*60*1000);
  const secIntoWindow = (now - boundary) / 1000;
  const staleTargetRisk = secIntoWindow < 90 ? 1 : 0;

  // Ensure price and target are on r before calcEarlyEntry uses them
  // (analyzeV5 now returns these, but set explicitly here as safety)
  if(r.price  == null) r.price  = price;
  if(r.target == null) r.target = target;

  const ec   = calcEarlyEntry(r);
  const cond = ec.conditions;

  return {
    id:          now + "_" + Math.random().toString(36).slice(2,6),
    ts:          now,
    boundary,
    date:        new Date(now).toLocaleDateString(),
    time:        new Date(now).toLocaleTimeString(),
    coin:        product,
    target:      +target.toFixed(4),
    price:       +price.toFixed(4),
    timeLeft:    +r.timeLeft.toFixed(2),
    decision:    r.decision,
    confidence:  r.confidence,
    yesScore:    r.yesScore,
    noScore:     r.noScore,
    mktYes:      +(r.mktYes*100).toFixed(1),
    mktNo:       +(r.mktNo*100).toFixed(1),
    fairYes:     +(r.fairYes*100).toFixed(1),
    edgeYes:     +(r.edgeYes*100).toFixed(1),
    edgeNo:      +(r.edgeNo*100).toFixed(1),
    microScore:  r.microScore,
    lagScore:    r.lagScore,
    momentum:    r.momentum.signal,
    flowSig:     r.flow.signal,
    obSig:       r.book.signal,
    rsi:         +r.rsi.toFixed(1),
    emaBias:     r.ema9 > r.ema21 ? "BULL" : "BEAR",
    htfScore:    r.htf.score,
    htfBias:     r.htf.cls,
    velSig:      r.velSig.type,
    futPrem:     +(r.futuresPrem.premium||0).toFixed(4),
    volHigh:     r.volatilityHigh ? 1 : 0,
    targetMagnet:r.targetMagnet ? 1 : 0,
    staleTargetRisk,                               // NEW: 1 = first 90s of window
    earlyInWindow:   ec.inWindow ? 1 : 0,
    earlyPassCount:  ec.passCount,
    earlyAlertLevel: ec.alertLevel,
    earlySide:       ec.inWindow ? ec.side : "",
    earlyRoiNow:     +ec.roiNow.toFixed(1),
    earlyRoiLost:    +ec.roiLost.toFixed(1),
    earlyC1Lag:      cond[0].ok ? 1 : 0,
    earlyC2HTF:      cond[1].ok ? 1 : 0,
    earlyC3MktWrong: cond[2].ok ? 1 : 0,          // renamed: was C3Price
    earlyC4Cushion:  cond[3].ok ? 1 : 0,          // new cushion logic
    earlyC5Momentum: cond[4].ok ? 1 : 0,
    earlyC6Edge:     cond[5].ok ? 1 : 0,
    earlyC7NoConsens:cond[6].ok ? 1 : 0,
    conf7Pct:        ec.conf7Pct,
    conf7Side:       ec.conf7Side,
    conf7HardBlock:  ec.hardBlock ? 1 : 0,
    // ── TWAP Guard + Exchange values (for future analysis) ───
    twapWinAvg:      windowTWAP.avg() !== null ? +windowTWAP.avg().toFixed(2) : null,
    twapGap:         windowTWAP.gapFromTarget(target) !== null ? +windowTWAP.gapFromTarget(target).toFixed(2) : null,
    twapLocked:      windowTWAP.lockedDirection(target) || "",
    twapProgress:    +windowTWAP.windowProgress().toFixed(3),
    twapSamples:     windowTWAP.samples.length,
    binancePrice:    multiExch.binance !== null ? +multiExch.binance.toFixed(2) : null,
    binanceDiv:      (multiExch.binance && multiExch.coinbase) ? +(multiExch.binance - multiExch.coinbase).toFixed(2) : null,
    krakenPrice:     multiExch.kraken  !== null ? +multiExch.kraken.toFixed(2) : null,
    britiProxy:      multiExch.britiProxy(target) !== null ? +multiExch.britiProxy(target).toFixed(2) : null,
    britiGap:        multiExch.britiProxy(target) !== null ? +(multiExch.britiProxy(target) - target).toFixed(2) : null,
    // ─────────────────────────────────────────────────────────
    outcome:         "PENDING",
    settlementPrice: null,
    priceDiffAtLog:  +(price - target).toFixed(4)
  };
}

// Settlement checker — runs every 60s, marks PENDING rows whose boundary has passed
async function checkSettlements() {
  const now = Date.now();
  let rows = logGetAll();
  let changed = false;

  const pending = rows.filter(r => r.outcome === "PENDING" && r.boundary < now - 60000);
  if(!pending.length) return;

  const groups = {};
  pending.forEach(r => {
    const key = r.coin + "_" + r.boundary;
    if(!groups[key]) groups[key] = { coin: r.coin, boundary: r.boundary, rows: [] };
    groups[key].rows.push(r);
  });

  for(const key of Object.keys(groups)) {
    const g = groups[key];
    try {
      const endISO   = new Date(g.boundary + 60000).toISOString();
      const startISO = new Date(g.boundary - 60000).toISOString();
      const url = `https://api.exchange.coinbase.com/products/${g.coin}/candles?granularity=60&start=${startISO}&end=${endISO}`;
      const candles = await fetchJ(url, 5000);
      if(!candles || !candles.length) continue;
      const sorted = candles.map(c=>({time:+c[0]*1000,close:+c[4]}))
                             .sort((a,b)=>Math.abs(a.time-g.boundary)-Math.abs(b.time-g.boundary));
      const settlementPrice = sorted[0].close;

      // ── Majority target fix ──────────────────────────────────
      // Rows logged in first 90s of a boundary may have stale (previous window's)
      // target. Find the majority target for this boundary (most common = correct).
      const targetCounts = {};
      g.rows.forEach(r => {
        const t = String(r.target);
        targetCounts[t] = (targetCounts[t]||0) + 1;
      });
      const majorityTarget = parseFloat(
        Object.entries(targetCounts).sort((a,b)=>b[1]-a[1])[0][0]
      );

      g.rows.forEach(r => {
        const rowRef = rows.find(x => x.id === r.id);
        if(!rowRef) return;
        rowRef.settlementPrice = +settlementPrice.toFixed(4);

        // Use majority target for stale rows, own target for fresh rows
        const useTarget = (rowRef.staleTargetRisk === 1 && rowRef.target !== majorityTarget)
          ? majorityTarget
          : rowRef.target;

        const yesWon = settlementPrice > useTarget;
        if(rowRef.decision === "BET YES")     rowRef.outcome = yesWon  ? "WIN" : "LOSS";
        else if(rowRef.decision === "BET NO") rowRef.outcome = !yesWon ? "WIN" : "LOSS";
        else                                  rowRef.outcome = "SKIP";

        // Flag if target was corrected
        if(rowRef.staleTargetRisk === 1 && rowRef.target !== majorityTarget) {
          rowRef.targetCorrected = 1;
          rowRef.correctedTarget = majorityTarget;
        }
        changed = true;
      });
    } catch(e) {}
  }

  if(changed) {
    logSave(rows);
    if(activeTab === "log") renderLogTab();
  }
}

// Stats from log rows
function logStats(rows) {
  const bets   = rows.filter(r => r.outcome === "WIN" || r.outcome === "LOSS");
  const wins   = bets.filter(r => r.outcome === "WIN").length;
  const losses = bets.filter(r => r.outcome === "LOSS").length;
  const winRate = bets.length ? (wins / bets.length * 100).toFixed(1) : "—";
  const pending = rows.filter(r => r.outcome === "PENDING").length;
  return { total: rows.length, bets: bets.length, wins, losses, winRate, pending };
}

// CSV export
function exportCSV() {
  const rows = logGetAll();
  if(!rows.length) { alert("No data logged yet."); return; }
  const cols = Object.keys(rows[0]);
  const lines = [cols.join(",")];
  rows.forEach(r => {
    lines.push(cols.map(c => {
      const v = r[c] === null || r[c] === undefined ? "" : String(r[c]);
      return v.includes(",") ? `"${v}"` : v;
    }).join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = `dce_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════
// EARLY ENTRY 6-CONDITION CHECKER  (window: 7–12 min)
// ═══════════════════════════════════════════════════════════════
function calcEarlyEntry(r) {
  // ── Side from actual decision ──────────────────────────────
  const decSide = (r.decision === "BET YES" || r.decision === "BET NO")
    ? (r.decision === "BET YES" ? "YES" : "NO")
    : (r.yes >= 0.5 ? "YES" : "NO");

  const mktYesFrac   = r.mktYes || 0.5;
  const mktNoFrac    = r.mktNo  || 0.5;
  const mktSidePrice = decSide === "YES" ? mktYesFrac : mktNoFrac;
  const mktOppPrice  = decSide === "YES" ? mktNoFrac  : mktYesFrac;

  // priceDiff: real price minus target
  const priceDiff  = (r.price != null && r.target != null)
    ? (r.price - r.target)
    : (r.avgCushion || 0);
  const absCushion = Math.abs(priceDiff);

  // Reference price for % calculations (BTC≈80k, ETH≈3k, SOL≈150, etc.)
  const refPrice = r.price || r.target || 80000;
  // Cushion as % of price — coin-agnostic threshold
  const cushionPct = refPrice > 0 ? (absCushion / refPrice) * 100 : 0;
  const cushionMinPct = 0.04;   // 0.04% of price = ~$32 for BTC, $0.06 for SOL

  const htf = r.htf ? r.htf.score : 0;
  const edgeY = r.edgeYes || 0;
  const edgeN = r.edgeNo  || 0;
  const edgeSide = decSide === "YES" ? edgeY : edgeN;
  const isCounterTrend = (decSide==="NO" && priceDiff>0) || (decSide==="YES" && priceDiff<0);

  // ── C1: Lag ≥ 2 ───────────────────────────────────────────
  const c1Ok  = (r.lagScore || 0) >= 2;
  const c1Cls = c1Ok ? (decSide==="YES"?"yes":"no") : "skip";
  const c1Txt = c1Ok ? `Lag ${r.lagScore}/3 — Kalshi behind` : `Lag ${r.lagScore||0}/3 — In sync`;

  // ── C2: HTF aligned with decision side ────────────────────
  // FIX: HTF ≥ +4 for YES is DANGEROUS (29% win rate), block it
  const htfAligned = decSide==="YES" ? (htf>=1 && htf<=3) : (htf<=-1);
  const c2Ok  = htfAligned;
  const c2Cls = c2Ok ? (decSide==="YES"?"yes":"no") : htf===0?"skip":"warn";
  const c2Txt = htf>=4 && decSide==="YES"
    ? `HTF +${htf} — Overextended ✗`
    : htf<=0 && decSide==="NO" && htf>-1
    ? `HTF ${htf} — Neutral ✗`
    : `HTF ${htf>=0?"+":""}${htf} — ${c2Ok?"Aligned ✓":"Misaligned ✗"}`;

  // ── C3: Market still mispriced — dead zone 8–22¢ blocked ──
  // opp > 55¢ = ideal; 22-55¢ = partial; 8-22¢ = DEAD ZONE 0% wins; <8¢ = Kalshi agrees
  const oppCents = mktOppPrice * 100;
  const inDeadZone = oppCents >= 8 && oppCents <= 22;
  const c3Ok  = oppCents > 55 || (oppCents > 22 && oppCents <= 55 && !inDeadZone);
  // Note: < 8¢ means market already fully agrees — no edge, but not the dead zone
  const c3Cls = c3Ok ? (decSide==="YES"?"yes":"no") : inDeadZone ? "no" : "warn";
  const c3Txt = inDeadZone
    ? `Opp ${oppCents.toFixed(0)}¢ — Dead zone (0% wins) ✗`
    : oppCents > 55
    ? `Opp ${oppCents.toFixed(0)}¢ — Market mispriced ✓`
    : oppCents <= 8
    ? `Opp ${oppCents.toFixed(0)}¢ — Kalshi already agrees`
    : `Opp ${oppCents.toFixed(0)}¢ — Partial mispricing`;

  // ── C4: Cushion % of price — coin-agnostic ────────────────
  const priceDirectionOk =
    (decSide==="YES" && priceDiff > 0) ||
    (decSide==="NO"  && priceDiff < 0) ||
    (decSide==="NO"  && priceDiff > 0 && htf <= -3);  // counter-trend NO
  const c4Ok  = priceDirectionOk && cushionPct >= cushionMinPct;
  const c4Cls = c4Ok ? (decSide==="YES"?"yes":"no") : "skip";
  const c4Txt = c4Ok
    ? `${cushionPct.toFixed(2)}% (${absCushion<10?absCushion.toFixed(2):"$"+absCushion.toFixed(0)}) ${isCounterTrend&&decSide==="NO"?"CTrend":"cushion"} ✓`
    : !priceDirectionOk
    ? `Wrong direction ${priceDiff>=0?"+":""}${absCushion<10?absCushion.toFixed(2):"$"+absCushion.toFixed(0)}`
    : `${cushionPct.toFixed(2)}% — Too thin`;

  // ── C5: Momentum — context-aware ──────────────────────────
  // FIX: REVERSAL SURGE in a CONFIRMED direction (HTF ≤ -4 for NO) is still bearish
  const mom = r.momentum ? r.momentum.signal : "NONE";
  const isConfirmedDirectionSurge =
    mom === "REVERSAL SURGE" && (
      (decSide==="NO"  && htf <= -4) ||
      (decSide==="YES" && htf >= 4)
    );
  const c5Ok  = mom !== "REVERSAL SURGE" || isConfirmedDirectionSurge;
  const c5Cls = c5Ok ? (mom==="NONE"?"skip":decSide==="YES"?"yes":"no") : "no";
  const c5Txt = !c5Ok
    ? "REVERSAL SURGE ✗"
    : isConfirmedDirectionSurge
    ? `Surge (confirmed dir) ✓`
    : mom==="NONE" ? "Clean — no surge" : mom.replace(" ACCELERATION","").replace("BULLISH","BULL").replace("BEARISH","BEAR");

  // ── C6: Edge ≥ 10 pts (strengthened) ──────────────────────
  const c6Ok  = edgeSide >= 10;
  const c6Cls = c6Ok ? (decSide==="YES"?"yes":"no") : "skip";
  const c6Txt = c6Ok
    ? `${edgeSide.toFixed(0)} pts edge ✓`
    : `${edgeSide.toFixed(0)} pts — Need 10+`;

  // ── C7: No Kalshi consensus — hard cap ≥ 80¢ ──────────────
  // FIX: Hard cap at 80¢ (was 75¢). mktYes ≥ 80¢ = near-zero ROI even on wins
  // Dead zone fix: also catch when side is suspiciously cheap (< 5¢ = already decided)
  const sideCents = mktSidePrice * 100;
  const c7Normal  = sideCents >= 25 && sideCents <= 80;   // was 75, now 80
  const c7Counter = isCounterTrend && oppCents > 60;
  const c7Ok  = c7Normal || c7Counter;
  const c7Cls = c7Ok ? (decSide==="YES"?"yes":"no") : "no";
  const c7Txt = sideCents > 80
    ? `${sideCents.toFixed(0)}¢ — Hard cap (ROI≈0%) ✗`
    : sideCents < 25 && !c7Counter
    ? `${sideCents.toFixed(0)}¢ — Kalshi agrees (no edge) ✗`
    : `${sideCents.toFixed(0)}¢ — Undecided ✓`;

  const conditions = [
    { label:"C1 Lag",        ok:c1Ok, cls:c1Cls, txt:c1Txt, w:1 },
    { label:"C2 HTF",        ok:c2Ok, cls:c2Cls, txt:c2Txt, w:2 },
    { label:"C3 Mkt Wrong",  ok:c3Ok, cls:c3Cls, txt:c3Txt, w:1.5 },
    { label:"C4 Cushion",    ok:c4Ok, cls:c4Cls, txt:c4Txt, w:1 },
    { label:"C5 Momentum",   ok:c5Ok, cls:c5Cls, txt:c5Txt, w:2 },
    { label:"C6 Edge",       ok:c6Ok, cls:c6Cls, txt:c6Txt, w:2.5 },
    { label:"C7 No Consens", ok:c7Ok, cls:c7Cls, txt:c7Txt, w:2 },
  ];

  const passCount = conditions.filter(c => c.ok).length;
  const inWindow  = r.timeLeft >= 7 && r.timeLeft <= 12;

  // ── Veto conditions — hard blocks regardless of score ─────
  const hardBlock = !c7Ok || (!c5Ok && !isConfirmedDirectionSurge) || inDeadZone ||
                    (htf >= 4 && decSide==="YES") || (htf === 0 && decSide==="NO") ||
                    (sideCents > 80);

  // ── 7C Confidence — independent weighted score ─────────────
  // Weights derived from data: C6 most predictive (+48pp), C7 (+34pp),
  // C2 (+23pp), C3 (+31pp), C1 (+31pp), C4/C5 situational
  // Each condition contributes its weight to max possible score
  const weights = { c1:1.0, c2:2.0, c3:1.5, c4:1.0, c5:2.0, c6:2.5, c7:2.0 };
  const maxWeight = Object.values(weights).reduce((a,b)=>a+b, 0);  // 12.0
  const earned = (c1Ok?weights.c1:0) + (c2Ok?weights.c2:0) + (c3Ok?weights.c3:0) +
                 (c4Ok?weights.c4:0) + (c5Ok?weights.c5:0) + (c6Ok?weights.c6:0) +
                 (c7Ok?weights.c7:0);
  // Hard blocks reduce confidence even if conditions pass
  const blockPenalty = hardBlock ? 0.35 : 0;
  const rawConf7 = Math.max(0, earned / maxWeight - blockPenalty);
  const conf7Pct = Math.round(rawConf7 * 100);
  // Which side the 7C confidence points to (same as decSide)
  const conf7Side = decSide;
  const conf7Cls  = conf7Pct >= 65 ? (conf7Side==="YES"?"yes":"no")
                  : conf7Pct >= 40 ? "warn" : "skip";
  const conf7Color = conf7Side==="YES" ? "var(--yes)" : "var(--no)";
  const conf7Label = conf7Pct >= 65 ? (conf7Side==="YES"?"YES edge":"NO edge")
                   : conf7Pct >= 40 ? "Weak edge" : "No clear edge";

  // ── Alert level (fire/warn/no-fire/none) ──────────────────
  let alertLevel = "none";
  if(!hardBlock && inWindow && passCount >= 6)      alertLevel = "fire";
  else if(!hardBlock && inWindow && passCount >= 4) alertLevel = "warn";
  else if(inWindow && passCount >= 2)               alertLevel = "no-fire";
  // Additional vetos for display
  if(!c5Ok && !isConfirmedDirectionSurge) alertLevel = "none";

  // ── ROI calculation ────────────────────────────────────────
  const buyFeeNow  = Math.min(0.07, 0.03 * mktSidePrice);
  const sellFeeW   = Math.min(0.07, 0.03 * 1.00);
  const totalIn    = mktSidePrice + buyFeeNow;
  const netProfit  = (1.00 - sellFeeW) - totalIn;
  const roiNow     = totalIn > 0 ? (netProfit / totalIn) * 100 : 0;
  const latePrice  = Math.min(0.90, mktSidePrice + 0.35);
  const buyFeeLate = Math.min(0.07, 0.03 * latePrice);
  const totalLate  = latePrice + buyFeeLate;
  const netLate    = (1.00 - sellFeeW) - totalLate;
  const roiLate    = totalLate > 0 ? (netLate / totalLate) * 100 : 0;
  const roiLost    = roiNow - roiLate;

  return {
    conditions, passCount, inWindow, side: decSide,
    mktSidePrice, roiNow, roiLate, roiLost,
    alertLevel, hardBlock,
    c1Ok, c2Ok, c3Ok, c4Ok, c5Ok, c6Ok, c7Ok,
    conf7Pct, conf7Side, conf7Cls, conf7Color, conf7Label,
    inDeadZone, isCounterTrend
  };
}


// ═══════════════════════════════════════════════════════════════
// GOLDEN RULE INDICATOR
// Derived from real data analysis across 178 bets / 4 datasets
// ═══════════════════════════════════════════════════════════════
function calcGoldenRule(r, ec) {
  const tl     = r.timeLeft || 0;
  const conf   = r.confidence || 0;
  const htf    = r.htf ? r.htf.score : 0;
  const mktY   = (r.mktYes || 0) * 100;
  const mktN   = 100 - mktY;

  // Exchange data for direction override
  const britiPrice = (multiExch && multiExch.britiProxy(r.target)) || r.price || 0;
  const britiGap   = britiPrice && r.target ? britiPrice - r.target : null;
  const cbGap      = r.price && r.target ? r.price - r.target : 0;
  const bnGap      = multiExch && multiExch.binance && r.target ? multiExch.binance - r.target : null;

  let exchAbove = 0, exchBelow = 0;
  if(cbGap > 0) exchAbove++; else if(cbGap < 0) exchBelow++;
  if(britiGap !== null){ if(britiGap > 0) exchAbove++; else exchBelow++; }
  if(bnGap !== null){ if(bnGap > 0) exchAbove++; else exchBelow++; }

  const exchConsensusYes = exchAbove >= 2;
  const exchConsensusNo  = exchBelow >= 2;
  const britiStrongYes   = britiGap !== null && britiGap > 40;
  const britiStrongNo    = britiGap !== null && britiGap < -40;
  const validCounterTrendNo  = exchConsensusYes && htf <= -3;
  const validCounterTrendYes = exchConsensusNo  && htf >= 3;

  // Exchange-confirmed side
  let exchSide;
  if(britiStrongYes && !validCounterTrendNo)         exchSide = "YES";
  else if(britiStrongNo && !validCounterTrendYes)    exchSide = "NO";
  else if(exchConsensusYes && !validCounterTrendNo)  exchSide = "YES";
  else if(exchConsensusNo  && !validCounterTrendYes) exchSide = "NO";
  else exchSide = null;  // no strong exchange signal

  // Decision engine side — this is usually correct
  // It reflects HTF, VWAP, trend, projected avg — all the slow signals
  const decSide = (r.decision === "BET YES") ? "YES" : "NO";

  // Only override when exchange is STRONGLY contradicting (>$40 gap)
  // Otherwise trust the decision engine which has the full signal picture
  const exchConflict = exchSide !== null && exchSide !== decSide &&
                       (britiStrongYes || britiStrongNo);

  const side = exchConflict ? exchSide : decSide;

  const price = side === "YES" ? mktY : mktN;

  // ── 5 Golden Rules ────────────────────────────────────────────────────────
  // Rule 1: Kalshi price 55–75¢
  const r1Ok   = price >= 55 && price <= 75;
  const r1Cls  = r1Ok ? "pass" : "fail";
  const r1Txt  = r1Ok
    ? `${price.toFixed(0)}¢ ✓ sweet spot`
    : price < 55 ? `${price.toFixed(0)}¢ — too cheap (<55¢)`
    : `${price.toFixed(0)}¢ — too expensive (>75¢)`;

  // Rule 2: Time left 8–13 min
  const r2Ok   = tl >= 8 && tl <= 13;
  const r2Warn = (tl >= 2 && tl < 8) || tl > 13;
  const r2Cls  = r2Ok ? "pass" : (tl>=2&&tl<4) ? "warn" : "fail";
  const r2Txt  = r2Ok
    ? `${tl.toFixed(1)} min ✓ prime window`
    : tl < 2 ? `${tl.toFixed(1)} min — too late`
    : tl < 8 ? `${tl.toFixed(1)} min — out of window (4–7m = 30% WR)`
    : `${tl.toFixed(1)} min — too early`;

  // Rule 3: HTF strength — includes FIX 3 for overextended check
  const r3OkYes = side==="YES" && htf >= 1 && htf <= 3;
  const r3OkNo  = side==="NO"  && htf <= -4;
  const r3Ok    = r3OkYes || r3OkNo;
  const r3Warn  = (side==="NO" && htf>=-3 && htf<=-1) || (side==="YES" && htf>=4 && htf<=6);
  const r3Cls   = r3Ok ? "pass" : r3Warn ? "warn" : "fail";
  const r3Txt   = r3Ok
    ? `HTF ${htf>=0?"+":""}${htf} ✓ ideal`
    : htf===0||htf===2 ? `HTF ${htf} ✗ blocked (0% WR)`
    : htf>=4 && side==="YES" ? `HTF +${htf} ✗ overextended for YES`
    : `HTF ${htf>=0?"+":""}${htf} — ok but not ideal`;

  // Rule 4: Confidence ≥ 90%
  const r4Ok   = conf >= 90;
  const r4Warn = conf >= 80 && conf < 90;
  const r4Cls  = r4Ok ? "pass" : r4Warn ? "warn" : "fail";
  const r4Txt  = r4Ok
    ? `${conf}% ✓ strong`
    : r4Warn ? `${conf}% — marginal (54% WR)`
    : `${conf}% — too low`;

  // Rule 5: Signal alignment
  const toolProb    = side==="YES" ? (r.yes||0) : (r.no||0);
  const toolAligned = toolProb >= 0.60;
  const microOk     = (r.microScore||0) >= 3;
  const r5Ok   = toolAligned && microOk;
  const r5Warn = toolAligned && !microOk;
  const r5Cls  = r5Ok ? "pass" : r5Warn ? "warn" : "fail";
  const r5Txt  = !toolAligned
    ? `Tool ${side} prob ${(toolProb*100).toFixed(0)}% — weak`
    : !microOk
    ? `Micro ${r.microScore||0}/14 — low edge`
    : `${(toolProb*100).toFixed(0)}% tool prob · micro ${r.microScore||0}/14 ✓`;

  const rules = [
    { label:"Price 55–75¢",  ok:r1Ok, warn:false,  cls:r1Cls, txt:r1Txt },
    { label:"Time 8–13 min", ok:r2Ok, warn:r2Warn, cls:r2Cls, txt:r2Txt },
    { label:"HTF strength",  ok:r3Ok, warn:r3Warn, cls:r3Cls, txt:r3Txt },
    { label:"Conf ≥ 90%",    ok:r4Ok, warn:r4Warn, cls:r4Cls, txt:r4Txt },
    { label:"Signal align",  ok:r5Ok, warn:r5Warn, cls:r5Cls, txt:r5Txt },
  ];

  const passCount = rules.filter(c => c.ok).length;
  const warnCount = rules.filter(c => !c.ok && c.warn).length;
  const failCount = rules.filter(c => !c.ok && !c.warn).length;

  // ── Hard blocks ───────────────────────────────────────────────────────────
  const isNoon = (() => {
    const now = new Date(); const h=now.getHours(), m=now.getMinutes();
    return (h===11&&m>=45)||(h===12&&m<=15);
  })();
  const isBadWindow    = tl >= 4 && tl <= 7;
  const isFeeHigh      = price > 80;
  const isFeeZero      = price < 15;
  const htfBlocked     = htf===0 || (htf===2 && side==="YES");

  // ── FIX 3: Override verdict when BRTI strongly disagrees with decision ────
  // If all exchanges point YES by $40+ but golden rule was about to say BET NO
  // (and it's NOT a valid counter-trend setup), override to SKIP with explanation
  const britiOverride = exchConflict && (britiStrongYes || britiStrongNo);

  // ── Verdict ───────────────────────────────────────────────────────────────
  let verdict, cls, summary, conflictNote = "";

  // Build conflict warning if exchange direction conflicts
  if(exchConflict) {
    const britiDir   = britiGap > 0 ? "YES" : "NO";
    const britiAmt   = Math.abs(britiGap||0).toFixed(0);
    const bnStr      = bnGap !== null ? ` · Binance +$${Math.abs(bnGap).toFixed(0)}` : "";
    conflictNote = `⚠ Exchange direction is ${britiDir} (BRTI +$${britiAmt}${bnStr}) — overriding to BET ${side}. `;
  }

  if(isNoon) {
    verdict="SKIP"; cls="skip";
    summary="⛔ 12 PM block — 0% win rate in all data. Wait for next window.";
  } else if(britiOverride && !validCounterTrendNo && !validCounterTrendYes) {
    // Exchange strongly disagrees — this is the key fix for the reported case
    verdict="SKIP"; cls="skip";
    const dir = britiGap > 0 ? "YES" : "NO";
    const opp = dir==="YES" ? "NO" : "YES";
    const gap = Math.abs(britiGap||0).toFixed(0);
    const bnNote = bnGap !== null ? ` · Binance $${Math.abs(bnGap).toFixed(0)} above target` : "";
    summary = `⛔ All exchanges point ${dir} (+$${gap} BRTI${bnNote}) — BET ${opp} has no edge. ${price.toFixed(0)}¢ is ${opp==="NO"?"falsely cheap — market correctly pricing YES":"falsely expensive"}.`;
  } else if(isFeeHigh) {
    verdict="SKIP"; cls="skip";
    summary=`⛔ Price ${price.toFixed(0)}¢ above 80¢ — fee trap, negative EV even on wins.`;
  } else if(isFeeZero) {
    verdict="SKIP"; cls="skip";
    summary=`⛔ Price ${price.toFixed(0)}¢ too cheap — win profit near zero after fees.`;
  } else if(htfBlocked) {
    verdict="SKIP"; cls="skip";
    summary=`⛔ HTF ${htf} — 0% win rate in all 4 datasets. Never bet here.`;
  } else if(isBadWindow) {
    verdict="WAIT"; cls="wait";
    summary=`⚠ ${tl.toFixed(1)} min left — 4–7m window has only 30% win rate. Wait for <4m or next window.`;
  } else if(passCount >= 4 && failCount === 0) {
    verdict="GO"; cls="go";
    const roiEst = price<=35?"100–350%":price<=55?"50–150%":price<=75?"20–60%":"5–25%";
    summary=`${conflictNote}✅ ${passCount}/5 rules pass — enter now. Expected ROI ~${roiEst} at $5 stake.`;
  } else if(passCount >= 3) {
    verdict="WAIT"; cls="wait";
    summary=`${conflictNote}👀 ${passCount}/5 rules pass — conditions forming. Watch for remaining to align.`;
  } else {
    verdict="SKIP"; cls="skip";
    summary=`${conflictNote}Only ${passCount}/5 rules pass. Not enough edge.`;
  }

  // ROI estimate
  const bf = Math.min(0.07, 0.03*price/100);
  const sf = Math.min(0.07, 0.03);
  const cost = price/100 + bf;
  const roiIfWin = cost > 0 ? (((1-sf)-cost)/cost*100) : 0;

  return {
    rules, passCount, warnCount, failCount,
    verdict, cls, summary, price, roiIfWin,
    isNoon, isBadWindow, side,
    exchConflict, exchSide, decSide,
    britiGap, bnGap, britiOverride,
    validCounterTrendNo, validCounterTrendYes
  };
}

    const adjustedMove  = expectedMove * (rsiBoosted ? 1.3 : 1.0);
    const requiredMove  = absGap + 15;
    const flipPct       = Math.min(99, Math.round((adjustedMove / requiredMove) * 100));
    const flipLabel     = flipPct >= 80 ? "Likely" : flipPct >= 40 ? "Possible" : flipPct >= 20 ? "Unlikely" : "Very unlikely";
    const flipCls       = flipPct >= 80 ? "yes"   : flipPct >= 40 ? "warn"     : "no";
    const movePerMin    = (vol * Math.sqrt(1) * 2).toFixed(0);

    const flipDetail = `<br><span class="small">~$${adjustedMove.toFixed(0)} expected move in ${minsLeft.toFixed(1)} min${rsiBoosted?" (RSI extreme)":""} · ~$${movePerMin}/min · Need $${requiredMove.toFixed(0)} → Flip: <b class="${flipCls}">${flipLabel} (${flipPct}%)</b></span>`;

    if(locked==="YES"){
      twapCls="locked-yes";
      twapWarnHTML=`<div class="twap-warning yes">⚠ Window avg LOCKED YES (+$${twapGap.toFixed(0)}) — NO needs $${requiredMove.toFixed(0)}+ drop${flipDetail}</div>`;
    } else if(locked==="NO"){
      twapCls="locked-no";
      twapWarnHTML=`<div class="twap-warning no">⚠ Window avg LOCKED NO (-$${absGap.toFixed(0)}) — YES needs $${requiredMove.toFixed(0)}+ rise${flipDetail}</div>`;
    } else if(absGap<15 && prog>0.5){
      twapCls="danger";
      twapWarnHTML=`<div class="twap-warning warn">⚡ Window avg $${twapGap.toFixed(1)} from target — too close to call, avoid betting</div>`;
    } else if(absGap<15){
      twapCls="warn";
      twapWarnHTML=`<div class="twap-warning warn">Window avg ${twapGap>=0?"+":""}$${twapGap.toFixed(1)} from target — direction not locked yet</div>`;
    }
  }

      <tr><td>15m</td><td><span class="${r.t15pos?"yes":"no"}">${r.t15pos?"▲ Pos":"▼ Neg"} (${r.trend15.toFixed(4)})</span></td><td class="small">${p15.toFixed(4)}</td></tr>
    </table>
  </div>
  <div class="section">
    <div class="section-title">HTF Context</div>
    <div class="row-item"><span class="row-label">HTF Score</span><span class="${r.htf.cls}">${r.htf.score} — ${r.htf.suggestion.replace("HTF BIAS: ","")}</span></div>
    <div class="row-item"><span class="row-label">30m / 60m / 120m</span><span class="small">${r.htf.trend30.toFixed(4)} · ${r.htf.trend60.toFixed(4)} · ${r.htf.trend120.toFixed(4)}</span></div>
    <div class="row-item"><span class="row-label">1h Range pos</span><span class="small">${r.htf.rangePos.toFixed(0)}% (L:${r.htf.low60.toFixed(2)} H:${r.htf.high60.toFixed(2)})</span></div>
    <div class="row-item"><span class="row-label">HTF Vol Spike</span><span class="${r.htf.volumeSpike60?"warn":"skip"}">${r.htf.volumeSpike60?"Yes":"No"}</span></div>
    <div class="row-item"><span class="row-label">Extended Move</span><span class="${r.htf.extendedMove?"warn":"skip"}">${r.htf.extendedMove?"⚠ Avoid chasing":"No"}</span></div>
    <div class="row-item"><span class="row-label">Wick Warning</span><span class="small">${r.htf.wickWarning}</span></div>
  </div>
  <div class="small" style="margin-top:8px;color:#445;text-align:center;">
    v6.7 · Window TWAP Guard · BRTI proxy · multi-exchange strip · 7C confidence
  </div>
</div>
`;}
// MAIN RUN
// ═══════════════════════════════════════════════════════════════
async function run(silent=false){
  const savedY=window.scrollY;
  const product=$("coin").value;
  const resultEl=$("result");
  clearErr();

  if(!silent||!resultEl.innerHTML.trim()){
    resultEl.innerHTML=`<div style="color:var(--muted);padding:12px;text-align:center;font-size:13px;">Loading data...</div>`;
  }
  if($("refreshStatus")) $("refreshStatus").innerHTML="⟳";

  await refreshKalshiTarget(silent);
  // Force TWAP boundary check every run() — catches cases where WS
  // was quiet and push() wasn't called at window boundary
  windowTWAP.checkBoundary();
  const target=+$("target").value;
  const marketInput=+$("market").value;

  if(!target||isNaN(target)){
    showErr("No target — Kalshi pull failed. Enter manually.");
    return;
  }

  try{
    const [candles, secondTicker] = await Promise.all([
      getRestCandles(product, 60),
      fetchSecondRest(product)
    ]);

    if(candles.length<30) throw new Error("Not enough candles");

    let price;
    if(liveState.coinbase && Date.now()-liveState.lastUpdate < 8000){
      price = liveState.coinbase;
      multiExch.set("coinbase", price);
      liveState.lastCbUpdate = Date.now();
      windowTWAP.push(price);           // ← always feed TWAP from run() too
    } else {
      price = await getRestTicker(product);
      tickStore.push(price,"unknown",0);
      multiExch.set("coinbase", price);
      liveState.lastCbUpdate = Date.now();
      windowTWAP.push(price);           // ← REST price also feeds TWAP
    }

    if(!liveState.fastPrice && secondTicker.ok){
      liveState.fastPrice = secondTicker.price;
      liveState.fastSource = secondTicker.source+" REST";
      updateLeader(product);
    }

    const closes=candles.slice(-30).map(c=>c.close);
    const latest=candles[candles.length-1];
    const latestAvg=(latest.open+latest.high+latest.low+latest.close)/4;
    const getPAgo=(m)=>{ const t=Date.now()-m*60000; return candles.reduce((p,c)=>Math.abs(c.time-t)<Math.abs(p.time-t)?c:p).close; };
    const p5=getPAgo(5), p10=getPAgo(10), p15=getPAgo(15);

    const r=analyzeV5({product,price,target,marketInput,candles,restCandles:candles,p5,p10,p15,latestAvg,secondPrice:secondTicker.ok?secondTicker.price:null});
    const exchPress=exchangePressure(price,secondTicker.ok?secondTicker.price:price,r.trend5,r.trend10,r.mktYes,r.mktNo);

    resultEl.innerHTML=renderResult(r,price,target,p5,p10,p15,product,secondTicker,exchPress);

    // Store globally for Trade tab access
    window._lastR       = r;
    window._lastMktYes  = r.mktYes;
    window._lastMktNo   = r.mktNo;

    // Log this snapshot to session store
    logAppend(buildLogRow(r, price, target, product));
    if(activeTab === "log") renderLogTab();

    // Restore whichever tab was active before the refresh
    switchTab(activeTab);

    // Auto-run ROI with suggested side
    setTimeout(()=>{ renderROI(r, r.mktYes, r.mktNo); updateOrderCalc(); }, 50);

    if($("refreshStatus")) $("refreshStatus").innerHTML=`✓ ${new Date().toLocaleTimeString()}`;

  }catch(e){
    console.error(e);
    if(silent&&resultEl.innerHTML.trim()){
      if($("refreshStatus")) $("refreshStatus").innerHTML="⚠ retry...";
      showErr(e.message);
    } else {
      showErr("Error: "+e.message);
      resultEl.innerHTML=`<div style="color:var(--muted);padding:12px;font-size:13px;">No result — waiting for data.</div>`;
    }
  } finally {
    setTimeout(()=>window.scrollTo(0,savedY),0);
  }
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener("DOMContentLoaded",()=>{
  // Resize canvas properly
  const canvas=$("miniChart");
  if(canvas){ canvas.style.width="100%"; canvas.style.height="48px"; }

  startAllSockets();
  startKalshiBgPoller();
  refreshKalshiTarget(false);
  tryRestoreSession();
  startSettlementChecker();
  logClearOld();

  $("market").addEventListener("input",()=>{ $("market").dataset.manualEdit="1"; });

  $("coin").addEventListener("change",async()=>{
    $("result").innerHTML="";
    $("market").value=""; $("market").dataset.manualEdit="";
    $("target").value="";
    clearErr(); latestKalshi=null;
    kalshiVel.history.length=0; fairHistory.length=0;
    tickStore.ticks.length=0; tickStore.candles5s.length=0;
    tickStore.candles10s.length=0; tickStore.candles30s.length=0;
    bookStore.bids.clear(); bookStore.asks.clear();
    localStorage.removeItem("sig_"+$("coin").value);
    localStorage.removeItem("sigC_"+$("coin").value);
    startAllSockets();
    startKalshiBgPoller();
    await refreshKalshiTarget(false);
  });
});
</script>
