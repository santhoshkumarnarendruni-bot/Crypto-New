<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Crypto Decision Engine v6.7</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080c10;--card:#0f1820;--card2:#0d1520;--border:#1a2535;--border2:#1f2d3d;
  --text:#d4dce8;--muted:#7f8c9a;--yes:#2ecc71;--no:#e74c3c;--warn:#f39c12;
  --info:#f1c40f;--conf:#3498db;--skip:#7f8c9a;
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,Arial,sans-serif;font-size:14px;}
body{padding:10px;max-width:480px;margin:auto;}

/* ── Controls ── */
.ctrl-row{display:flex;gap:6px;align-items:stretch;margin-top:6px;}
select,input{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:9px 10px;font-size:14px;width:100%;}
button{background:#1a7a42;border:none;color:#fff;font-weight:700;border-radius:6px;padding:9px 12px;font-size:14px;cursor:pointer;white-space:nowrap;}
button:active{opacity:.8;}
.btn-auto{background:#1a3a6a;}
.btn-auto.on{background:#7a3a1a;}
.btn-refresh{background:#1a4a6a;width:40px;flex-shrink:0;font-size:16px;}
.ctrl-row select{flex:1;}

/* ── Status bar ── */
.status-bar{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-top:8px;overflow:hidden;font-size:12px;}
.sb-item{flex:1;padding:5px 6px;border-right:1px solid var(--border);min-width:0;}
.sb-item:last-child{border-right:none;}
.sb-label{color:var(--muted);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-val{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Mini chart ── */
#miniChart{display:block;width:100%;height:48px;border-radius:6px;background:var(--card2);margin-top:6px;}

/* ── Status/error text ── */
.status-txt{font-size:11px;color:var(--muted);margin-top:4px;min-height:14px;}
.error-txt{font-size:11px;color:var(--no);margin-top:4px;min-height:14px;line-height:1.4;}

/* ── Signal Colors ── */
.yes{color:var(--yes);font-weight:700;} .no{color:var(--no);font-weight:700;}
.skip{color:var(--skip);font-weight:700;} .warn{color:var(--warn);font-weight:700;}
.info{color:var(--info);} .conf{color:var(--conf);font-weight:700;}
.small{font-size:11px;color:var(--muted);}

/* ── Decision Card (always visible) ── */
.decision-card{border:2px solid var(--info);border-radius:10px;padding:12px 14px;margin-top:8px;background:#0c1408;line-height:1.6;}
.decision-card.yes-card{border-color:var(--yes);background:#071208;}
.decision-card.no-card{border-color:var(--no);background:#120707;}
.decision-big{font-size:26px;font-weight:800;letter-spacing:.5px;line-height:1.1;}
.conf-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;font-size:13px;align-items:center;}
.conf-pill{background:rgba(255,255,255,.06);border-radius:5px;padding:2px 8px;font-size:13px;}
.alert-strip{border-radius:6px;padding:6px 10px;margin-top:6px;font-size:12px;font-weight:700;line-height:1.4;}
.alert-strip.yes{background:#061a0e;border:1px solid var(--yes);color:var(--yes);}
.alert-strip.no{background:#1a0606;border:1px solid var(--no);color:var(--no);}
.alert-strip.warn{background:#1a1000;border:1px solid var(--warn);color:var(--warn);}
.alert-strip.info{background:#1a1600;border:1px solid var(--info);color:var(--info);}

/* ── Quick stats grid ── */
.q-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.q-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.q-val{font-size:15px;font-weight:700;margin-top:1px;}
.q-sub{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── Price row ── */
.price-row{display:flex;align-items:baseline;gap:8px;margin-top:6px;flex-wrap:wrap;}
.price-big{font-size:20px;font-weight:700;}
.price-diff{font-size:13px;font-weight:700;}
.price-target{font-size:13px;color:var(--muted);}

/* ── Tabs ── */
.tab-bar{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;margin-top:10px;overflow:hidden;}
.tab-btn{flex:1;padding:9px 4px;font-size:12px;font-weight:600;color:var(--muted);background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;transition:all .15s;}
.tab-btn:last-child{border-right:none;}
.tab-btn.active{background:var(--card);color:var(--text);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── Inside tabs ── */
.row-item{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.row-item:last-child{border-bottom:none;}
.row-label{color:var(--muted);font-size:12px;}
.section{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;}
.section-title{font-size:13px;font-weight:700;margin-bottom:6px;}
.prob-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px;}
.prob-cell{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 8px;text-align:center;}
.prob-cell .label{font-size:10px;color:var(--muted);}
.prob-cell .val{font-size:15px;font-weight:700;margin-top:1px;}
.tick-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.tick-chip{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px;font-weight:600;}
table{width:100%;border-collapse:collapse;margin-top:4px;font-size:12px;}
td,th{border-bottom:1px solid var(--border);padding:5px 6px;text-align:left;vertical-align:top;}
th{color:var(--info);font-size:11px;}
.scalp-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;margin-bottom:6px;}
.scalp-badge.yes{background:#0a2010;border:1px solid var(--yes);color:var(--yes);}
.scalp-badge.no{background:#200a0a;border:1px solid var(--no);color:var(--no);}
.scalp-badge.warn{background:#201000;border:1px solid var(--warn);color:var(--warn);}
.scalp-badge.skip{background:#141414;border:1px solid var(--skip);color:var(--skip);}

/* ── Inline alert cards (micro/scalp/cushion shown on main screen) ── */
.inline-alert{border-radius:8px;padding:8px 11px;margin-top:6px;font-size:12px;line-height:1.5;}
.inline-alert.yes{background:#061a0e;border:1px solid var(--yes);}
.inline-alert.no{background:#1a0606;border:1px solid var(--no);}
.inline-alert.warn{background:#1a1000;border:1px solid var(--warn);}
.inline-alert.skip{background:#111820;border:1px solid var(--border);}
.inline-alert-title{font-weight:700;font-size:13px;margin-bottom:2px;}
.inline-alert-sub{color:var(--muted);font-size:11px;}

/* ── Compact exchange strip ── */
.exch-strip{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:6px;}
.exch-cell{flex:1;padding:6px 8px;border-right:1px solid var(--border);min-width:0;}
.exch-cell:last-child{border-right:none;}
.exch-cell-label{font-size:10px;color:var(--muted);}
.exch-cell-val{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Tick chips wrap tighter ── */
.tick-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tick-chip{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:3px 7px;font-size:11px;font-weight:600;}

/* ── Combined Proj + Early Entry box ── */
.combo-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-top:8px;}
.combo-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.combo-proj{min-width:0;}
.combo-proj-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.combo-proj-val{font-size:18px;font-weight:800;color:var(--info);line-height:1.1;margin-top:1px;}
.combo-proj-sub{font-size:10px;margin-top:2px;}
.combo-ec-header{text-align:right;white-space:nowrap;}
.combo-ec-count{font-size:15px;font-weight:800;line-height:1;}
.combo-ec-label{font-size:10px;color:var(--muted);}

/* 7 conditions in responsive grid */
.ec-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.ec-row{display:flex;align-items:center;gap:5px;padding:3px 0;}
.ec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ec-dot.yes{background:var(--yes);}
.ec-dot.no{background:var(--no);}
.ec-dot.skip{background:#2b3643;}
.ec-dot.warn{background:var(--warn);}
.ec-text{font-size:11px;line-height:1.2;min-width:0;}
.ec-label{font-weight:700;font-size:10px;color:var(--muted);}
.ec-val{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;}

/* ── 7C Confidence meter ── */
.conf7-wrap{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.conf7-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.conf7-bar-bg{height:10px;border-radius:5px;background:var(--border);overflow:hidden;position:relative;}
.conf7-bar-fill{height:100%;border-radius:5px;transition:width .4s;}
.conf7-row{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
.conf7-pct{font-size:18px;font-weight:800;line-height:1;}
.conf7-side{font-size:11px;font-weight:700;margin-left:5px;}
.conf7-detail{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;word-break:break-word;padding-bottom:6px;}

/* Two smaller stat boxes below (RSI + Early Bias) */
.stat2-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;}
.stat2-box{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 8px;}
.stat2-label{font-size:10px;color:var(--muted);text-transform:uppercase;}
.stat2-val{font-size:13px;font-weight:700;margin-top:1px;}
.stat2-sub{font-size:10px;color:var(--muted);margin-top:1px;}

/* Early entry fire banner (above the combo box) */
.early-signal{border-radius:9px;padding:10px 12px;margin-top:8px;font-size:13px;line-height:1.6;display:none;}
.early-signal.show{display:block;}
.early-signal.fire{background:#021a08;border:2px solid var(--yes);}
.early-signal.warn{background:#1a1000;border:2px solid var(--warn);}
.early-signal.no-fire{background:#1a0303;border:2px solid var(--no);}
.early-signal-title{font-size:16px;font-weight:800;letter-spacing:.3px;}
.log-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.log-toolbar button{width:auto;padding:6px 12px;font-size:12px;margin-top:0;}
.log-toolbar .btn-danger{background:#7a1a1a;}
.log-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;}
.log-stat{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 8px;text-align:center;}
.log-stat-val{font-size:16px;font-weight:800;}
.log-stat-label{font-size:10px;color:var(--muted);margin-top:1px;}
.log-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.log-table{width:100%;border-collapse:collapse;font-size:11px;min-width:580px;}
.log-table th{background:var(--card2);padding:5px 6px;text-align:left;font-size:10px;color:var(--info);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;}
.log-table td{padding:5px 6px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
.log-table tr:hover td{background:var(--card2);}
.outcome-win{color:var(--yes);font-weight:700;}
.outcome-loss{color:var(--no);font-weight:700;}
.outcome-pending{color:var(--muted);}
.outcome-skip{color:var(--skip);}
/* ── Golden Rule Indicator ── */
.golden-wrap{margin-top:8px;padding:10px 12px;border-radius:8px;border:2px solid var(--border);}
.golden-wrap.go{border-color:#f1c40f;background:#0e0e00;}
.golden-wrap.wait{border-color:var(--warn);background:#0e0800;}
.golden-wrap.skip{border-color:var(--border);background:var(--card);}
.golden-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.golden-badge{font-size:15px;font-weight:800;letter-spacing:.5px;padding:3px 12px;border-radius:20px;}
.golden-badge.go{background:#f1c40f;color:#000;}
.golden-badge.wait{background:var(--warn);color:#000;}
.golden-badge.skip{background:#2b3643;color:var(--muted);}
.golden-rules{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.gr-row{display:flex;align-items:center;gap:5px;font-size:11px;padding:2px 0;}
.gr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.gr-dot.pass{background:var(--yes);}
.gr-dot.fail{background:var(--no);}
.gr-dot.warn{background:var(--warn);}
.gr-text{color:var(--text);}
.gr-sub{font-size:10px;color:var(--muted);}
.golden-summary{font-size:11px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);color:var(--muted);}
.golden-roi{font-size:13px;font-weight:700;}

/* ── Cheat Sheet Tab ── */
.cheat-section{margin-bottom:14px;}
.cheat-section h3{font-size:13px;font-weight:700;color:var(--info);margin:0 0 6px 0;text-transform:uppercase;letter-spacing:.5px;}
.cheat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
.cheat-row:last-child{border-bottom:none;}
.cheat-key{color:var(--muted);font-size:11px;flex:0 0 45%;}
.cheat-val{font-size:12px;font-weight:700;text-align:right;}
.cheat-block{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.cheat-combo{background:var(--card);border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11px;line-height:1.5;}
.cheat-combo .label{font-weight:700;font-size:12px;margin-bottom:2px;}
.cheat-avoid{background:#1a0505;border:1px solid var(--no);border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11px;}
.cheat-avoid .label{color:var(--no);font-weight:700;}
.cheat-go{background:#040e00;border:1px solid var(--yes);border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11px;}
.cheat-go .label{color:var(--yes);font-weight:700;}
/* 25002500 Probability summary bar 25002500 */
.prob-bar{display:flex;align-items:stretch;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:5px;}
.prob-bar-cell{flex:1;padding:5px 7px;min-width:0;}
.prob-bar-divider{width:1px;background:var(--border);flex-shrink:0;}
.prob-bar-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.prob-bar-vals{display:flex;align-items:baseline;gap:3px;white-space:nowrap;}
.prob-bar-vals span{font-size:12px;font-weight:700;}
.prob-bar-sep{font-size:9px;color:var(--muted) !important;font-weight:400 !important;}
.twap-guard{border-radius:8px;padding:9px 12px;margin-top:6px;border:1px solid var(--border);background:var(--card2);}
.twap-guard.locked-yes{border-color:var(--yes);background:#041208;}
.twap-guard.locked-no{border-color:var(--no);background:#120404;}
.twap-guard.danger{border-color:var(--no);background:#1a0404;}
.twap-guard.warn{border-color:var(--warn);background:#120e00;}
.twap-guard.neutral{border-color:var(--border);}
.twap-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
.twap-bar-bg{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin:4px 0;}
.twap-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.twap-row{display:flex;justify-content:space-between;font-size:12px;margin-top:3px;}
.twap-warning{font-size:11px;font-weight:700;margin-top:4px;padding:4px 8px;border-radius:5px;}
.twap-warning.yes{background:#041208;color:var(--yes);}
.twap-warning.no{background:#120404;color:var(--no);}
.twap-warning.warn{background:#120e00;color:var(--warn);}
/* ── Multi-exchange strip ── */
.exch5-strip{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:6px;}
.exch5-cell{flex:1;padding:5px 6px;border-right:1px solid var(--border);min-width:0;}
.exch5-cell:last-child{border-right:none;}
.exch5-label{font-size:9px;color:var(--muted);white-space:nowrap;}
.exch5-val{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exch5-sub{font-size:9px;color:var(--muted);}
.brti-box{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;margin-top:5px;font-size:12px;}
.brti-label{color:var(--muted);font-size:10px;}
.brti-val{font-weight:700;font-size:14px;}
/* ── Return Optimizer ── */
.roi-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center;}
.roi-box.highlight{border-color:var(--yes);background:#061a0e;}
.roi-box.highlight.no-side{border-color:var(--no);background:#1a0606;}
.roi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.roi-val{font-size:20px;font-weight:800;margin-top:2px;}
.roi-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.stake-row{display:flex;gap:6px;align-items:center;margin-top:8px;}
.stake-row input{flex:1;margin-top:0;font-size:15px;font-weight:700;}
.stake-row select{flex:0 0 80px;margin-top:0;font-size:12px;}
.fee-note{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5;}
.roi-bar{height:6px;border-radius:3px;background:var(--border);margin-top:6px;overflow:hidden;}
.roi-bar-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ── Trade buttons ── */
.trade-btn-row{display:flex;gap:8px;margin-top:10px;}
.trade-btn{flex:1;padding:13px 8px;font-size:15px;font-weight:800;border-radius:8px;border:none;cursor:pointer;letter-spacing:.3px;}
.trade-btn.yes-btn{background:#1a7a42;color:#fff;}
.trade-btn.no-btn{background:#7a1a1a;color:#fff;}
.trade-btn:disabled{opacity:.35;cursor:not-allowed;}
.trade-status{border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;line-height:1.6;display:none;}
.trade-status.ok{background:#061a0e;border:1px solid var(--yes);display:block;}
.trade-status.err{background:#1a0606;border:1px solid var(--no);display:block;}
.trade-status.pending{background:#1a1000;border:1px solid var(--warn);display:block;}
.api-key-row{display:flex;gap:6px;margin-top:6px;align-items:center;}
.api-key-row input{flex:1;margin-top:0;font-size:12px;font-family:monospace;}
.positions-list{margin-top:6px;}
.pos-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.pos-item:last-child{border-bottom:none;}
.sell-btn{background:#7a1a1a;color:#fff;border:none;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<!-- ── Header ── -->
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
  <div style="font-size:15px;font-weight:700;">Decision Engine <span class="info">v6.7</span></div>
  <div id="refreshStatus" class="status-txt" style="margin:0;"></div>
</div>

<!-- ── Controls ── -->
<div class="ctrl-row">
  <select id="coin" style="flex:1.2;margin-top:0;">
    <option value="BTC-USD">BTC</option>
    <option value="ETH-USD">ETH</option>
    <option value="SOL-USD">SOL</option>
    <option value="XRP-USD">XRP</option>
    <option value="DOGE-USD">DOGE</option>
    <option value="BNB-USD">BNB</option>
  </select>
  <input id="target" type="number" step="0.01" placeholder="Target (auto)" style="flex:2;margin-top:0;">
  <button class="btn-refresh" id="btnTargetRefresh" onclick="refreshKalshiTarget(true)">↻</button>
</div>
<div class="ctrl-row">
  <input id="market" type="number" step="0.01" min="0" max="1" placeholder="Kalshi YES prob (auto)" style="flex:2;margin-top:0;">

function $(id){ return document.getElementById(id); }
function setText(id, v){ const e=$(id); if(e) e.textContent = v; }
function setHTML(id, v){ const e=$(id); if(e) e.innerHTML = v; }
function setClass(id, c){ const e=$(id); if(e) e.className = c; }
function clamp(x, lo, hi){ return Math.max(lo, Math.min(hi, x)); }
function showErr(m){ const e=$("errorMsg"); if(e) e.textContent = m||""; }
function clearErr(){ showErr(""); }

async function fetchJ(url, timeout=5000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), timeout);
  try{
    const r = await fetch(url,{cache:"no-store",signal:ctrl.signal});
    if(!r.ok) throw new Error("HTTP "+r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}

// ═══════════════════════════════════════════════════════════════
// KALSHI CONFIG
// ═══════════════════════════════════════════════════════════════
const KALSHI_SERIES = {
  "BTC-USD":"KXBTC15M","ETH-USD":"KXETH15M","SOL-USD":"KXSOL15M",
  "XRP-USD":"KXXRP15M","DOGE-USD":"KXDOGE15M","BNB-USD":null
};

// ═══════════════════════════════════════════════════════════════
// TICK ENGINE
// ═══════════════════════════════════════════════════════════════
const TICK_PERIODS = [5, 10, 30];

const tickStore = {
  ticks: [],
  candles5s:  [],
  candles10s: [],
  candles30s: [],
  openCandle: null,
  openPeriod: 10,
  maxTicks: 600,
  maxCandles: 120,

  push(price, side, volume){
    const now = Date.now();
    this.ticks.push({price, time: now, side: side||"unknown", volume: volume||0});
    if(this.ticks.length > this.maxTicks) this.ticks.shift();
    this._aggregate(this.candles5s,  5000,  now, price, volume);
    this._aggregate(this.candles10s, 10000, now, price, volume);
    this._aggregate(this.candles30s, 30000, now, price, volume);
  },

  _aggregate(arr, periodMs, now, price, volume){
    const boundary = Math.floor(now / periodMs) * periodMs;
    const last = arr[arr.length-1];
    if(last && last.boundary === boundary){
      last.high   = Math.max(last.high, price);
      last.low    = Math.min(last.low, price);
      last.close  = price;
      last.volume += (volume||0);
      last.count++;
    } else {
      arr.push({ boundary, open:price, high:price, low:price, close:price, volume:volume||0, count:1 });
      if(arr.length > this.maxCandles) arr.shift();
    }
  },

  getCandles(period){
    if(period===5)  return this.candles5s;
    if(period===10) return this.candles10s;
    return this.candles30s;
  },

  getRecentCloses(period, n){
    const arr = this.getCandles(period);
    return arr.slice(-n).map(c=>c.close);
  },

  tickVWAP(windowMs = 180000){
    const now = Date.now();
    const cutoff = now - windowMs;
    let pv = 0, w = 0;
    for(const t of this.ticks){
      if(t.time < cutoff) continue;
      const age = (now - t.time) / windowMs;
      const weight = Math.exp(-age * 2);
      pv += t.price * weight;
      w  += weight;
    }
    return w > 0 ? pv/w : 0;
  },

  flowRatio(n=30){
    const slice = this.ticks.slice(-n);
    if(!slice.length) return { ratio: 0.5, buys: 0, sells: 0, signal: "WAITING", cls: "skip" };
    const buys  = slice.filter(t=>t.side==="buy").length;
    const sells = slice.filter(t=>t.side==="sell").length;
    const total = slice.length;
    const ratio = buys / total;
    let signal = "NEUTRAL FLOW", cls = "skip";
    if(ratio >= 0.70){ signal = "STRONG BUY FLOW"; cls = "yes"; }
    else if(ratio >= 0.60){ signal = "BUY PRESSURE"; cls = "yes"; }
    else if(ratio <= 0.30){ signal = "STRONG SELL FLOW"; cls = "no"; }
    else if(ratio <= 0.40){ signal = "SELL PRESSURE"; cls = "no"; }
    return { ratio, buys, sells, total, signal, cls };
  }
};

// ═══════════════════════════════════════════════════════════════
// ORDER BOOK ENGINE
// ═══════════════════════════════════════════════════════════════
const bookStore = {
  bids: new Map(),
  asks: new Map(),
  lastMid: 0,

  applySnapshot(bids, asks){
    this.bids.clear(); this.asks.clear();
    for(const [p,s] of bids) this.bids.set(+p, +s);
    for(const [p,s] of asks) this.asks.set(+p, +s);
    this._updateMid();
  },

  applyUpdate(changes){
    for(const [side, price, size] of changes){
      const map = side==="buy" ? this.bids : this.asks;
      const p = +price, s = +size;
      if(s === 0) map.delete(p); else map.set(p, s);
    }
    this._updateMid();
  },

  _updateMid(){
    const topBid = this.bids.size ? Math.max(...this.bids.keys()) : 0;
    const topAsk = this.asks.size ? Math.min(...this.asks.keys()) : 0;
    if(topBid && topAsk) this.lastMid = (topBid+topAsk)/2;
  },

  imbalance(pct=0.003){
    if(!this.lastMid) return { ratio:0.5, signal:"WAITING", cls:"skip", bidDepth:0, askDepth:0 };
    const lo = this.lastMid*(1-pct), hi = this.lastMid*(1+pct);
    let bidD=0, askD=0;
    for(const [p,s] of this.bids) if(p>=lo) bidD+=s;
    for(const [p,s] of this.asks) if(p<=hi) askD+=s;
    const total = bidD+askD;
    if(!total) return { ratio:0.5, signal:"NO DATA", cls:"skip", bidDepth:0, askDepth:0 };
    const ratio = bidD/total;
    let signal="BALANCED BOOK", cls="skip";
    if(ratio>=0.65){ signal="HEAVY BID WALL"; cls="yes"; }
    else if(ratio>=0.58){ signal="BID SIDE HEAVIER"; cls="yes"; }
    else if(ratio<=0.35){ signal="HEAVY ASK WALL"; cls="no"; }
    else if(ratio<=0.42){ signal="ASK SIDE HEAVIER"; cls="no"; }
    return { ratio, signal, cls, bidDepth:bidD, askDepth:askD };
  }
};

// ═══════════════════════════════════════════════════════════════
// KALSHI VELOCITY TRACKER
// ═══════════════════════════════════════════════════════════════
const kalshiVel = {
  history: [],
  maxLen: 10,

  push(yesMid){
    const now = Date.now();
    this.history.push({time:now, yesMid});
    if(this.history.length > this.maxLen) this.history.shift();
  },

  velocity(n=4){
    const slice = this.history.slice(-Math.min(n, this.history.length));
    if(slice.length < 2) return 0;
    const first=slice[0], last=slice[slice.length-1];
    const mins = Math.max(0.017, (last.time - first.time)/60000);
    return ((last.yesMid - first.yesMid) * 100) / mins;
  },

  lagSignal(currentPrice, lastSnapshotPrice){
    const vel = this.velocity();
    const priceDeltaPct = lastSnapshotPrice>0 ? Math.abs((currentPrice-lastSnapshotPrice)/lastSnapshotPrice)*100 : 0;
    const kalshiMoving = Math.abs(vel) >= 3.0;
    const priceStill = priceDeltaPct < 0.05;

    if(kalshiMoving && priceStill){
      return { signal: vel>0 ? "KALSHI REPRICING UP (AHEAD OF PRICE)" : "KALSHI REPRICING DOWN (AHEAD OF PRICE)",
               cls: vel>0?"yes":"no", vel, type:"kalshi_leads" };
    }
    if(!kalshiMoving && priceDeltaPct >= 0.07){
      return { signal: currentPrice>lastSnapshotPrice ? "KALSHI LAGGING BULLISH MOVE" : "KALSHI LAGGING BEARISH MOVE",
               cls: currentPrice>lastSnapshotPrice?"yes":"no", vel, type:"price_leads" };
    }
    return { signal: Math.abs(vel)>1?"Slow repricing ("+vel.toFixed(1)+" pts/min)":"Kalshi in sync", cls:"skip", vel, type:"sync" };
  },

  persistentLag(currentPrice){
    if(this.history.length < 3) return false;
    const oldest = this.history[0];
    const latestYes = this.history[this.history.length-1].yesMid;
    const kalshiMove = Math.abs((latestYes - oldest.yesMid)*100);
    return kalshiMove < 2.0;
  }
};

async function startKalshiBgPoller(){
  if(kalshiBgTimer) clearInterval(kalshiBgTimer);
  // Poll every 8s (was 12s) — more attempts means more chances to succeed
  kalshiBgTimer = setInterval(async ()=>{
    const product = $("coin").value;
    const k = await fetchKalshiViaProxy(product);
    if(k && k.yesMid !== null){
      kalshiVel.push(k.yesMid);
      latestKalshi = k;
      const yesPct = (k.yesMid*100).toFixed(1);
      const vel = kalshiVel.velocity();
      const velStr = vel>=0.5?` ▲${vel.toFixed(1)}`:vel<=-0.5?` ▼${Math.abs(vel).toFixed(1)}`:` →`;
      setText("tbKalshi", `YES ${yesPct}%${velStr}`);
      setClass("tbKalshi", vel>=2?"yes":vel<=-2?"no":"skip");
      if($("market") && !$("market").dataset.manualEdit){
        $("market").value = k.yesMid.toFixed(4);
      }
      clearErr(); // clear any "pull failed" error once we succeed
    }
  }, 8000);
}

// ═══════════════════════════════════════════════════════════════
// BTC REFERENCE FEED
// ═══════════════════════════════════════════════════════════════
const btcRef = {
  price: null,
  prevPrice: null,
  trend: 0,
  update(p){
    if(this.price) this.trend = p - this.price;
    this.prevPrice = this.price;
    this.price = p;
  },
  correlation(coinTrend5){
    if(!this.price || this.trend===0) return { signal:"NO BTC DATA", cls:"skip", boost:0 };
    const agree = (this.trend>0 && coinTrend5>0)||(this.trend<0 && coinTrend5<0);
    const disagree = (this.trend>0 && coinTrend5<0)||(this.trend<0 && coinTrend5>0);
    if(agree) return { signal:"BTC CONFIRMS DIRECTION", cls: this.trend>0?"yes":"no", boost:6 };
    if(disagree) return { signal:"BTC DIVERGING — CAUTION", cls:"warn", boost:-8 };
    return { signal:"BTC NEUTRAL", cls:"skip", boost:0 };
  }
};
let btcSocket = null;

function startBtcFeed(){
  if($("coin").value==="BTC-USD") return;
  try{ if(btcSocket) btcSocket.close(); }catch(e){}
  try{
    btcSocket = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@trade");
    btcSocket.onmessage = e=>{
      try{ const d=JSON.parse(e.data); if(d.p) btcRef.update(+d.p); }catch(err){}
    };
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════
// FUTURES PREMIUM
// ═══════════════════════════════════════════════════════════════
const futuresPrem = { premium:0, signal:"—", cls:"skip", lastUpdate:0 };
let futuresTimer = null;

async function fetchFuturesPremium(product){
  const map={"BTC-USD":"BTCUSDT","ETH-USD":"ETHUSDT","SOL-USD":"SOLUSDT","XRP-USD":"XRPUSDT","DOGE-USD":"DOGEUSDT","BNB-USD":"BNBUSDT"};
  const sym = map[product];
  if(!sym) return;
  try{
    const d = await fetchJ(`https://fapi.binance.com/fapi/v1/premiumIndex?symbol=${sym}`, 4000);
    const mark=+d.markPrice, index=+d.indexPrice;
    if(!mark||!index) return;
    const pct = ((mark-index)/index)*100;
    futuresPrem.premium = pct;
    futuresPrem.lastUpdate = Date.now();
    if(pct > 0.04){      futuresPrem.signal="FUTURES BULLISH PREM"; futuresPrem.cls="yes"; }
    else if(pct > 0.015){ futuresPrem.signal="MILD BULL PREMIUM";   futuresPrem.cls="yes"; }
    else if(pct < -0.04){ futuresPrem.signal="FUTURES BEARISH DISC"; futuresPrem.cls="no"; }
    else if(pct < -0.015){futuresPrem.signal="MILD BEAR DISCOUNT";  futuresPrem.cls="no"; }
    else {                futuresPrem.signal="FUTURES NEUTRAL";      futuresPrem.cls="skip"; }
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════════
// WEBSOCKET MANAGER
// ═══════════════════════════════════════════════════════════════
let liveState = {
  coinbase: null, fastPrice: null, fastSource:"—",
  leader:"WAITING", lagScore:0, spread:0, spreadPct:0,
  status:"Starting...", lastUpdate:0
};

function dynThreshold(product){
  return ["DOGE-USD","XRP-USD"].includes(product) ? {strong:0.035,weak:0.015} : {strong:0.020,weak:0.007};
}

function updateLeader(product){
  if(!liveState.coinbase || !liveState.fastPrice) return;
  liveState.spread = liveState.fastPrice - liveState.coinbase;
  liveState.spreadPct = (liveState.spread/liveState.coinbase)*100;
  const {strong,weak} = dynThreshold(product);
  const p = Math.abs(liveState.spreadPct);
  if(p > strong){
    liveState.leader = liveState.fastSource+(liveState.spread>0?" leading UP":" leading DOWN");
    liveState.lagScore = 3;
  } else if(p > weak){
    liveState.leader = "Small "+liveState.fastSource+" lead";
    liveState.lagScore = 1;
  } else {
    liveState.leader = "No clear leader";
    liveState.lagScore = 0;
  }
  updateStatusBar();
}

function updateStatusBar(){
  const f=liveState;
  if(f.coinbase){ setText("tbCoinbase", f.coinbase.toFixed(2)); setClass("tbCoinbase","sb-val info"); }
  if(f.coinbase && f.fastPrice){
    const lagTxt = f.lagScore>=3 ? "⚡LAG "+f.lagScore+"/3" : f.lagScore>=1 ? "~lag" : "synced";
    setText("tbSpread", lagTxt);
    setClass("tbSpread","sb-val "+(f.lagScore>=3?"warn":f.lagScore>=1?"info":"skip"));
  }
  // Window TWAP chip
  const tg = $("target") ? +$("target").value : 0;
  const twapData = windowTWAP.getGuardData(tg);
  const twapEl = $("tbWinTwap");
  if(twapEl && twapData.est && tg){
    const gap = twapData.gap;
    const locked = twapData.locked;
    const symbol = gap > 0 ? "▲" : "▼";
    twapEl.textContent = (gap>=0?"+":"")+gap.toFixed(0)+" "+symbol+" ("+twapData.sampleCount+"s)";
    twapEl.className = "sb-val "+(locked==="YES"?"yes":locked==="NO"?"no":Math.abs(gap||0)<15?"warn":"skip");
  } else if(twapEl){
    twapEl.textContent = twapData.sampleCount>0?twapData.sampleCount+"pts":"—";
    twapEl.className = "sb-val skip";
  }
  // BRTI proxy chip
  const britiEl = $("tbBrti");
  if(britiEl){
    const brti = multiExch.britiProxy(tg);
    if(brti && tg){
      const bg = brti - tg;
      britiEl.textContent = brti.toFixed(0)+" ("+(bg>=0?"+":"")+bg.toFixed(0)+")";
      britiEl.className = "sb-val "+(bg>15?"yes":bg<-15?"no":"skip");
    } else if(brti){
      britiEl.textContent = brti.toFixed(0);
      britiEl.className = "sb-val info";
    }
  }
}

function startAllSockets(){
  const product = $("coin").value;
  const binSym  = product.replace("-USD","USDT").replace("-USDC","USDT").toLowerCase();

  liveState = { coinbase:null, fastPrice:null, fastSource:"—", leader:"WAITING",
                lagScore:0, spread:0, spreadPct:0, status:"Connecting...", lastUpdate:0 };
  // Reset window trackers
  windowTWAP.boundary = 0;
  windowTWAP.samples  = [];
  windowTWAP.krakenPrice = null;
  windowTWAP.britiProxy  = null;
  multiExch.coinbase = null;
  multiExch.binance  = null;
  multiExch.kraken   = null;

  // Start dedicated Binance price poller (independent of fast WS chain)
  startBinancePoller(product);
  // Start dedicated Kraken WS always running in parallel (not a fallback)
  startKrakenDedicated(product);

  ["cbTickerWs","cbL2Ws","fastWs","krakenWs"].forEach(k=>{
    try{ if(window[k]) window[k].close(); }catch(e){}
  });
  // Also close dedicated Kraken WS
  try{ if(krakenDedicatedWs) krakenDedicatedWs.close(); }catch(e){}

  try{
    window.cbTickerWs = new WebSocket("wss://ws-feed.exchange.coinbase.com");
    window.cbTickerWs.onopen = ()=>{
      window.cbTickerWs.send(JSON.stringify({type:"subscribe",product_ids:[product],channels:["ticker"]}));
    };
    window.cbTickerWs.onmessage = e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==="ticker" && d.price){
          const price = +d.price;
          liveState.coinbase = price;
          liveState.lastUpdate = Date.now();
          liveState.lastCbUpdate = Date.now();   // ← dedicated CB timestamp
          const side = d.side==="buy"?"buy":d.side==="sell"?"sell":"unknown";
          tickStore.push(price, side, +d.last_size||0);
          windowTWAP.push(price);
          multiExch.set("coinbase", price);
          updateLeader(product);
          updateStatusBar();
          drawMiniChart();
          liveState.status = "Live Coinbase WS";
        }
      }catch(err){}
    };
    window.cbTickerWs.onerror=()=>{ liveState.status="Coinbase WS error"; };
  }catch(e){}

  try{
    window.cbL2Ws = new WebSocket("wss://advanced-trade-ws.coinbase.com");
    window.cbL2Ws.onopen = ()=>{
      window.cbL2Ws.send(JSON.stringify({type:"subscribe",product_ids:[product],channel:"level2"}));
    };
    window.cbL2Ws.onmessage = e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.channel==="l2_data" && d.events){
          for(const ev of d.events){
            if(ev.type==="snapshot" && ev.updates){
              const bids=[], asks=[];
              for(const u of ev.updates){
                if(u.side==="bid") bids.push([u.price_level, u.new_quantity]);
                else               asks.push([u.price_level, u.new_quantity]);
              }
              bookStore.applySnapshot(bids, asks);
            } else if(ev.type==="update" && ev.updates){
              const changes = ev.updates.map(u=>[u.side==="bid"?"buy":"sell", u.price_level, u.new_quantity]);
              bookStore.applyUpdate(changes);
            }
          }
          updateStatusBar();
        }
      }catch(err){}
    };
    window.cbL2Ws.onerror=()=>{};
  }catch(e){}

  try{
    window.fastWs = new WebSocket(`wss://stream.binance.com:9443/ws/${binSym}@trade`);
    window.fastWs.onmessage = e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.p){
          liveState.fastPrice=+d.p;
          liveState.fastSource="Binance";
          multiExch.set("binance", +d.p);     // ← Track Binance separately
          updateLeader(product);
        }
      }catch(err){}
    };
    window.fastWs.onerror = ()=>{ startKrakenFallback(product); };
    window.fastWs.onclose = ()=>{ if(!liveState.fastPrice) startKrakenFallback(product); };
    setTimeout(()=>{ if(!liveState.fastPrice) startKrakenFallback(product); }, 4000);
  }catch(e){ startKrakenFallback(product); }

  startBtcFeed();
  if(futuresTimer) clearInterval(futuresTimer);
  fetchFuturesPremium(product);
  futuresTimer = setInterval(()=>fetchFuturesPremium(product), 30000);
}

// ── Dedicated Kraken WS — always runs in parallel, not a fallback ──────────
let krakenDedicatedWs  = null;
let krakenPollerTimer  = null;

function startKrakenDedicated(product) {
  const map = {"BTC-USD":"BTC/USD","ETH-USD":"ETH/USD","SOL-USD":"SOL/USD","XRP-USD":"XRP/USD","DOGE-USD":"DOGE/USD"};
  const sym = map[product];
  if(!sym) return;

  // Clear existing
  try{ if(krakenDedicatedWs) krakenDedicatedWs.close(); }catch(e){}
  if(krakenPollerTimer) clearInterval(krakenPollerTimer);

  const connect = () => {
    try{
      krakenDedicatedWs = new WebSocket("wss://ws.kraken.com/v2");
      krakenDedicatedWs.onopen = () => {
        krakenDedicatedWs.send(JSON.stringify({method:"subscribe",params:{channel:"ticker",symbol:[sym]}}));
      };
      krakenDedicatedWs.onmessage = e => {
        try{
          const d = JSON.parse(e.data);
          if(d.channel==="ticker" && d.data?.length){
            const p = +(d.data[0].last || d.data[0].bid);
            if(p > 0){
              multiExch.set("kraken", p);
              // Only use Kraken as fastPrice fallback if Binance WS is gone
              if(!multiExch.binance || multiExch.isStale("binance", 15000)){
                liveState.fastPrice  = p;
                liveState.fastSource = "Kraken";
                updateLeader(product);
              }
            }
          }
        }catch(err){}
      };
      // Auto-reconnect on close
      krakenDedicatedWs.onclose = () => {
        setTimeout(connect, 3000);   // reconnect after 3s
      };
      krakenDedicatedWs.onerror = () => {
        pollKrakenREST(product);     // immediate REST fallback
      };
    }catch(e){
      pollKrakenREST(product);
    }
  };

  connect();

  // REST backup every 10s regardless of WS state
  krakenPollerTimer = setInterval(() => pollKrakenREST(product), 10000);
  pollKrakenREST(product);   // immediate first poll
}

async function pollKrakenREST(product) {
  const krakenMap = {"BTC-USD":"XBTUSD","ETH-USD":"ETHUSD","SOL-USD":"SOLUSD","XRP-USD":"XRPUSD","DOGE-USD":"DOGEUSD"};
  const pair = krakenMap[product];
  if(!pair) return;
  try{
    const d = await fetchJ(`https://api.kraken.com/0/public/Ticker?pair=${pair}`, 4000);
    const key = d.result ? Object.keys(d.result)[0] : null;
    if(key){

}

function drawMiniChart(){
  const canvas = $("miniChart"); if(!canvas) return;
  const dpr = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 48 * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  const w=rect.width, h=48;
  const ticks = tickStore.ticks.slice(-100);
  if(ticks.length<2){ ctx.clearRect(0,0,w,h); return; }
  const prices = ticks.map(t=>t.price);
  const mn=Math.min(...prices), mx=Math.max(...prices);
  const range=mx-mn||1;
  ctx.clearRect(0,0,w,h);
  const target = +$("target").value;
  if(target>0 && target>=mn && target<=mx){
    const ty = h-((target-mn)/range)*(h-10)-5;
    ctx.strokeStyle="#f1c40f44"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(0,ty); ctx.lineTo(w,ty); ctx.stroke();
    ctx.setLineDash([]);
  }
  const lastP = prices[prices.length-1];
  const col = lastP > (target||0) ? "#2ecc71" : "#e74c3c";
  ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath();
  prices.forEach((p,i)=>{
    const x=i/(prices.length-1)*w;
    const y=h-((p-mn)/range)*(h-10)-5;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,col+"44"); grad.addColorStop(1,col+"00");
  ctx.fillStyle=grad;
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath(); ctx.fill();
}

// KALSHI FETCH
// ═══════════════════════════════════════════════════════════════
function kalshiUrl(series){
  return `https://api.elections.kalshi.com/trade-api/v2/markets?series_ticker=${series}&status=open&limit=5`;
}

function parseKalshi(text){
  try{
    const data = typeof text==="string"?JSON.parse(text):text;
    if(!data.markets?.length) return null;
    const m = data.markets.slice().sort((a,b)=>new Date(a.close_time)-new Date(b.close_time))[0];
    const strike = m.floor_strike??m.strike_value??m.cap_strike??null;
    if(strike===null) return null;
    const toFrac=(dStr,cInt)=>{ if(dStr!=null&&dStr!=="") return +dStr; if(cInt!=null&&cInt!=="") return cInt/100; return null; };
    const yesBid=toFrac(m.yes_bid_dollars??m.yes_bid_dollar, m.yes_bid);
    const yesAsk=toFrac(m.yes_ask_dollars??m.yes_ask_dollar, m.yes_ask);
    const lastP =toFrac(m.last_price_dollars??m.last_price_dollar, m.last_price);
    const mid = (yesBid!=null&&yesAsk!=null)?(yesBid+yesAsk)/2:(lastP??yesBid);
    return {target:+strike, ticker:m.ticker, closeTime:m.close_time, yesBid, yesAsk, yesMid:mid, noMid:mid==null?null:1-mid};
  }catch(e){ return null; }
}

async function fetchKalshiViaProxy(product){
  const series = KALSHI_SERIES[product];
  if(!series) return null;

  const url = kalshiUrl(series);
  const enc = encodeURIComponent(url);

  // ── 7 proxy attempts in order of reliability ──────────────
  const attempts = [
    // 1. Direct Kalshi API (works if CORS allows it from browser)
    () => fetchJ(url, 4000).then(j => parseKalshi(j)),

    // 2. allorigins — most reliable CORS proxy
    () => fetchJ(`https://api.allorigins.win/get?url=${enc}`, 5000)
          .then(j => parseKalshi(j.contents)),

    // 3. corsproxy.io
    () => fetchJ(`https://corsproxy.io/?url=${enc}`, 5000)
          .then(j => parseKalshi(JSON.stringify(j))),

    // 4. allorigins raw endpoint (different response format)
    () => fetchJ(`https://api.allorigins.win/raw?url=${enc}`, 5000)
          .then(j => parseKalshi(j)),

    // 5. codetabs proxy
    () => fetchJ(`https://api.codetabs.com/v1/proxy?quest=${enc}`, 5000)
          .then(j => parseKalshi(j)),

    // 6. htmldriven proxy
    () => fetchJ(`https://thingproxy.freeboard.io/fetch/${url}`, 5000)
          .then(j => parseKalshi(j)),

    // 7. jsonp.afeld.me
    () => fetchJ(`https://cors.eu.org/${url}`, 5000)
          .then(j => parseKalshi(j)),
  ];

  // Try all in parallel — return first that succeeds
  try {
    return await Promise.any(
      attempts.map(fn =>
        fn().then(x => {
          if(!x || x.target == null) throw new Error("null");
          return x;
        }).catch(() => { throw new Error("failed"); })
      )
    );
  } catch(e) {
    // Sequential fallback — try each one by one with longer timeout
    for(const fn of attempts) {
      try {
        const result = await fn();
        if(result && result.target != null) return result;
      } catch(e2) { /* try next */ }
    }
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════
// TECHNICAL INDICATORS
// ═══════════════════════════════════════════════════════════════
function RSI(closes){
  if(closes.length<2) return 50;
  const period=Math.min(14,closes.length-1);
  let g=0,l=0;
  for(let i=1;i<=period;i++){ const d=closes[i]-closes[i-1]; d>0?g+=d:l-=d; }
  let ag=g/period, al=l/period;
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;
    al=(al*(period-1)+(d<0?-d:0))/period;
  }
  return 100-(100/(1+(al===0?100:ag/al)));
}

function EMA(values, period){
  if(!values.length) return 0;
  const k=2/(period+1);
  const seedLen=Math.min(period,values.length);
  let ema=values.slice(0,seedLen).reduce((a,b)=>a+b,0)/seedLen;
  for(let i=seedLen;i<values.length;i++) ema=values[i]*k+ema*(1-k);
  return ema;
}

function VOL(closes){
  let s=0; for(let i=1;i<closes.length;i++) s+=Math.abs(closes[i]-closes[i-1]);
  return s/Math.max(1,closes.length-1);
}

function decayVWAP(candles, halfLifeCandles=15){
  let pv=0,v=0; const n=candles.length;
  candles.forEach((c,i)=>{
    const typical=(c.high+c.low+c.close)/3;
    const age=n-1-i;
    const weight=Math.exp(-age*Math.log(2)/halfLifeCandles);
    pv+=typical*c.volume*weight; v+=c.volume*weight;
  });
  return v?pv/v:candles[candles.length-1].close;
}

function plainVWAP(candles){
  let pv=0,v=0;
  candles.forEach(c=>{ const t=(c.high+c.low+c.close)/3; pv+=t*c.volume; v+=c.volume; });
  return v?pv/v:candles[candles.length-1].close;
}

function avgVol(candles){ return candles.reduce((s,c)=>s+c.volume,0)/Math.max(1,candles.length); }

function momentumAccel(candles){
  if(candles.length<6) return {signal:"NONE",cls:"skip",detail:"—",accel:0};
  const last3=candles.slice(-3), prev3=candles.slice(-6,-3);
  const lastMove=last3[last3.length-1].close-last3[0].open;
  const prevMove=prev3[prev3.length-1].close-prev3[0].open;
  const accel=lastMove-prevMove;
  const lastVol=last3.reduce((s,c)=>s+c.volume,0);
  const prevVol=prev3.reduce((s,c)=>s+c.volume,0);
  const volRatio=prevVol>0?lastVol/prevVol:1;
  const ref=candles[candles.length-1].close||1;
  const pct=Math.abs(lastMove/ref)*100;
  if(pct>=0.07&&volRatio>=1.35){
    if(lastMove>0&&prevMove>=0) return {signal:"BULLISH ACCELERATION",cls:"yes",detail:`+${pct.toFixed(3)}% 3c, vol×${volRatio.toFixed(1)}`,accel};
    if(lastMove<0&&prevMove<=0) return {signal:"BEARISH ACCELERATION",cls:"no", detail:`${pct.toFixed(3)}% drop 3c, vol×${volRatio.toFixed(1)}`,accel};
    return {signal:"REVERSAL SURGE",cls:"warn",detail:`Reversal vol×${volRatio.toFixed(1)}`,accel};
  }
  if(pct>=0.04&&volRatio>=1.15)
    return {signal:lastMove>0?"MILD BULL PUSH":"MILD BEAR PUSH",cls:lastMove>0?"yes":"no",detail:`${pct.toFixed(3)}% vol×${volRatio.toFixed(1)}`,accel};
  return {signal:"NONE",cls:"skip",detail:"No accel",accel};
}

function htfBias(price, candles){
  const closes=candles.map(c=>c.close);
  const getPAgo=(m)=>{ const t=Date.now()-m*60000; return candles.reduce((p,c)=>Math.abs(c.time-t)<Math.abs(p.time-t)?c:p).close; };
  const p30=getPAgo(30),p60=getPAgo(60),p120=getPAgo(120);
  const last60=candles.slice(-60);
  const vwap60=plainVWAP(last60.length?last60:candles);
  const ema60=EMA(closes.slice(-90),60);
  const high60=Math.max(...(last60.length?last60:candles).map(c=>c.high));
  const low60 =Math.min(...(last60.length?last60:candles).map(c=>c.low));
  const latest=candles[candles.length-1];
  const range60=Math.max(0.000001,high60-low60);
  const rangePos=((price-low60)/range60)*100;
  const avgVol60=avgVol((last60.length?last60:candles).slice(0,-1));
  const volSpike60=latest.volume>avgVol60*1.5;
  const upperWickPct=(latest.high-Math.max(latest.open,latest.close))/Math.max(0.000001,latest.high-latest.low);
  const lowerWickPct=(Math.min(latest.open,latest.close)-latest.low)/Math.max(0.000001,latest.high-latest.low);
  const t30=price-p30, t60=price-p60, t120=price-p120;
  let score=0;
  if(t30>0)score++;else score--;
  if(t60>0)score++;else score--;
  if(t120>0)score++;else score--;
  if(price>vwap60)score++;else score--;
  if(price>ema60)score++;else score--;
  if(volSpike60&&score>0)score++;
  if(volSpike60&&score<0)score--;
  if(upperWickPct>0.45)score--;
  if(lowerWickPct>0.45)score++;
  let suggestion="HTF BIAS: NEUTRAL / WAIT", cls="skip";
  if(score>=4){ suggestion="HTF BIAS: YES SIDE — confirm 15m"; cls="yes"; }
  else if(score<=-4){ suggestion="HTF BIAS: NO SIDE — confirm 15m"; cls="no"; }
  const extendedMove=Math.abs(t60)>Math.max(VOL(closes.slice(-30))*6,price*0.0015);
  const wickWarn=upperWickPct>0.45?"Upper wick YES danger":lowerWickPct>0.45?"Lower wick NO danger":"No major wick warning";
  return {score,suggestion,cls,trend30:t30,trend60:t60,trend120:t120,vwap60,ema60,high60,low60,rangePos,volumeSpike60:volSpike60,extendedMove,wickWarning:wickWarn};
}

function getTimeLeft(){
  const fifteen=15*60*1000;
  return Math.max(0,(Math.floor(Date.now()/fifteen)*fifteen+fifteen-Date.now())/60000);
}

// ═══════════════════════════════════════════════════════════════
// WINDOW TWAP ENGINE
// ═══════════════════════════════════════════════════════════════
// Tracks the rolling average price SINCE the current 15-min window opened
const windowTWAP = {
  boundary: 0,
  samples: [],
  krakenPrice: null,
  britiProxy: null,

  push(price) {
    const now     = Date.now();
    const fifteen = 15 * 60 * 1000;
    const bnd     = Math.floor(now / fifteen) * fifteen;
    if(bnd !== this.boundary) {
      this.boundary = bnd;
      this.samples  = [];
    }
    // Purge stale: only keep samples from current window start
    this.samples = this.samples.filter(s => s.ts >= bnd);
    this.samples.push({ price, ts: now });
    if(this.samples.length > 180) this.samples.shift();
    this._updateBRTI(price);
  },

  // Called from run() every cycle to force boundary check
  // even when WS is quiet between auto-refresh cycles
  checkBoundary() {
    const now     = Date.now();
    const fifteen = 15 * 60 * 1000;
    const bnd     = Math.floor(now / fifteen) * fifteen;
    if(bnd !== this.boundary) {
      this.boundary = bnd;
      this.samples  = [];
    } else {
      // Purge any samples older than window start (safety net)
      this.samples = this.samples.filter(s => s.ts >= bnd);
    }
  },

  _updateBRTI(cbPrice) {
    if(this.krakenPrice && cbPrice) {
      this.britiProxy = cbPrice * 0.60 + this.krakenPrice * 0.40;
    } else {
      this.britiProxy = cbPrice;
    }
  },

  updateKraken(price) {
    this.krakenPrice = price;
    if(this.samples.length > 0)
      this._updateBRTI(this.samples[this.samples.length-1].price);
  },

  avg() {
    if(!this.samples.length) return null;
    return this.samples.reduce((s,p) => s + p.price, 0) / this.samples.length;
  },

  weightedAvg() {
    if(!this.samples.length) return null;
    const n = this.samples.length;
    let pv = 0, w = 0;
    this.samples.forEach((s, i) => { const wt=i+1; pv+=s.price*wt; w+=wt; });
    return pv / w;
  },

  windowProgress() {
    const now = Date.now(), fifteen = 15*60*1000;
    return Math.min(1, (now - this.boundary) / fifteen);
  },

  settlementEstimate() { return this.weightedAvg(); },

  gapFromTarget(target) {
    const est = this.settlementEstimate();
    if(!est || !target) return null;
    return est - target;
  },

  lockedDirection(target, minGap = 15) {
    if(this.samples.length < 5) return null;
    const gap = this.gapFromTarget(target);
    if(gap === null) return null;
    const threshold = minGap * (1.5 - this.windowProgress());
    if(gap >  threshold) return "YES";
    if(gap < -threshold) return "NO";
    return null;
  },

  getGuardData(target) {
    const est  = this.settlementEstimate();
    const gap  = est && target ? est - target : null;
    const prog = this.windowProgress();
    const locked = this.lockedDirection(target);
    const britiEst = this.britiProxy;
    const britiGap = britiEst && target ? britiEst - target : null;
    // Stale flag: TWAP and BRTI disagree by >$100 = stale overnight samples
    const isStale = britiGap !== null && gap !== null && Math.abs(gap - britiGap) > 100;
    return {
      est, avg: this.avg(), wa: this.weightedAvg(),
      gap, prog, locked,
      sampleCount: this.samples.length,
      minsSinceStart: prog * 15,
      britiEst, britiGap, isStale,
      krakenPrice: this.krakenPrice
    };
  }
};

// ═══════════════════════════════════════════════════════════════
// DEDICATED BINANCE PRICE POLLER
// Runs independently of the fast WS chain so Binance data is
// always available even when Binance WS is blocked/falls to Kraken
// ═══════════════════════════════════════════════════════════════
let binancePollerTimer = null;
let binanceWsDedicated = null;

function startBinancePoller(product) {
  // Clear any existing
  if(binancePollerTimer)  clearInterval(binancePollerTimer);
  try{ if(binanceWsDedicated) binanceWsDedicated.close(); }catch(e){}

  const sym = product.replace("-USD","USDT").replace("-USDC","USDT").toLowerCase();

  // Try WebSocket first (sub-second updates)
  try {
    binanceWsDedicated = new WebSocket(`wss://stream.binance.com:9443/ws/${sym}@ticker`);
    binanceWsDedicated.onmessage = e => {
      try {
        const d = JSON.parse(e.data);
        // @ticker gives c = last price, more reliable than @trade p field
        const p = +(d.c || d.p || 0);
        if(p > 0) {
          multiExch.set("binance", p);
          updateStatusBar();
        }
      } catch(err) {}
    };
    binanceWsDedicated.onerror = () => startBinanceRESTPoller(product);
    binanceWsDedicated.onclose = () => {
      // If WS closed and we have no recent data, fall to REST
      if(!multiExch.binance || multiExch.isStale("binance", 20000)) {
        startBinanceRESTPoller(product);
      }
    };
  } catch(e) {
    startBinanceRESTPoller(product);
  }

  // Also keep a REST backup polling every 8 seconds regardless
  binancePollerTimer = setInterval(() => pollBinanceREST(product), 8000);
}

async function pollBinanceREST(product) {
  const sym = product.replace("-USD","USDT").replace("-USDC","USDT");
  try {
    const d = await fetchJ(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`, 3000);
    if(d.price && +d.price > 0) {
      multiExch.set("binance", +d.price);
      updateStatusBar();
    }
  } catch(e) {
    // Try Binance.US as backup
    try {
      const d2 = await fetchJ(`https://api.binance.us/api/v3/ticker/price?symbol=${sym}`, 3000);
      if(d2.price && +d2.price > 0) {
        multiExch.set("binance", +d2.price);
        updateStatusBar();
      }
    } catch(e2) {}
  }
}

function startBinanceRESTPoller(product) {
  // Immediate fetch then let the interval handle subsequent ones
  pollBinanceREST(product);
}
const multiExch = {
  coinbase: null,
  binance:  null,
  kraken:   null,
  lastCb:   0,
  lastBn:   0,
  lastKr:   0,

  set(exchange, price) {
    if(!price || isNaN(price)) return;
    this[exchange]    = price;
    this["last"+exchange.charAt(0).toUpperCase()+exchange.slice(1)] = Date.now();
    if(exchange === "kraken") windowTWAP.updateKraken(price);
    // Update status bar whenever any exchange price arrives
    updateStatusBar();
  },

  britiProxy(target) {
    // Best BRTI estimate: CB 60% + Kraken 40% when available, else CB alone
    const cb = this.coinbase, kr = this.kraken;
    const brti = (cb && kr) ? cb * 0.60 + kr * 0.40
               : cb ? cb : null;
    return brti;
  },

  // Binance divergence vs Coinbase
  binanceDivergence() {
    if(!this.binance || !this.coinbase) return null;
    return this.binance - this.coinbase;
  },

  isStale(exchange, maxAgeMs = 15000) {
    const key = "last"+exchange.charAt(0).toUpperCase()+exchange.slice(1);
    return !this[key] || (Date.now() - this[key]) > maxAgeMs;
  },

  // Returns human-readable age string: "live", "2s ago", "1m 3s ago", or "—"
  age(exchange) {
    const key = "last"+exchange.charAt(0).toUpperCase()+exchange.slice(1);
    let ts = this[key] || 0;
    // For coinbase, liveState.lastCbUpdate is set on every WS tick — use it
    if(exchange === "coinbase" && typeof liveState !== "undefined" && liveState.lastCbUpdate) {
      ts = Math.max(ts, liveState.lastCbUpdate);
    }
    if(!ts) return "—";
    const ms = Date.now() - ts;
    if(ms < 0) return "now";
    const s = Math.floor(ms / 1000);
    if(s < 5)  return "live";
    if(s < 60) return s+"s ago";
    return Math.floor(s/60)+"m "+(s%60)+"s ago";
  },

  // CSS class for age: fresh=yes, ok=skip, stale=warn, very stale=no
  ageCls(exchange, freshMs=5000, staleMs=15000) {
    const key = "last"+exchange.charAt(0).toUpperCase()+exchange.slice(1);
    let ts = this[key] || 0;
    if(exchange === "coinbase" && typeof liveState !== "undefined" && liveState.lastCbUpdate) {
      ts = Math.max(ts, liveState.lastCbUpdate);
    }
    if(!ts) return "no";
    const ms = Date.now() - this[key];
    if(ms < freshMs)  return "yes";
    if(ms < staleMs)  return "skip";
    if(ms < 30000)    return "warn";
    return "no";
  }
};

function projectedSettlement(price, latestAvg, trend5, trend10, trend15, timeLeft){
  const urgency = 1 - Math.exp(-((15-timeLeft)/15)*2.5);
  const trendProj = trend5*0.50+trend10*0.30+trend15*0.20;
  return (latestAvg*(0.65+urgency*0.25)) + (price*(0.35-urgency*0.25)) + (trendProj*0.12);
}

function tickIndicators(){
  const closes10 = tickStore.getRecentCloses(10, 30);
  if(closes10.length < 3) return null;
  return {
    ema5tick:  EMA(closes10, 3),
    ema13tick: EMA(closes10, 8),
    rsiTick:   RSI(closes10.slice(-15)),
    volTick:   VOL(closes10.slice(-10)),
    micro30vwap: tickStore.tickVWAP(120000),
    trend30s:    closes10.length>=4 ? closes10[closes10.length-1]-closes10[closes10.length-4] : 0,
    trend60s:    closes10.length>=7 ? closes10[closes10.length-1]-closes10[closes10.length-7] : 0,
  };
}

const fairHistory = [];
function trackFairDivergence(fairYes, marketYes){
  const now=Date.now();
  fairHistory.push({time:now, edge: fairYes-marketYes});
  if(fairHistory.length>6) fairHistory.shift();
  if(fairHistory.length<2) return {signal:"—",cls:"skip",earlyEntry:false};
  const first=fairHistory[0].edge, last=fairHistory[fairHistory.length-1].edge;
  const widening=Math.abs(last)>Math.abs(first);
  const consistent=fairHistory.every(h=>Math.sign(h.edge)===Math.sign(last));
  if(consistent && Math.abs(last)>=0.06 && widening){
    const side=last>0?"YES":"NO";
    return {signal:`EARLY ENTRY: ${side} MISPRICING WIDENING (${(Math.abs(last)*100).toFixed(1)} pts)`,cls:last>0?"yes":"no",earlyEntry:true,edge:last};
  }
  if(consistent && Math.abs(last)>=0.08){
    return {signal:`MISPRICING HOLD: ${last>0?"YES":"NO"} edge ${(Math.abs(last)*100).toFixed(1)} pts`,cls:last>0?"yes":"no",earlyEntry:false,edge:last};
  }
  return {signal:"No sustained divergence",cls:"skip",earlyEntry:false,edge:last};
}

function applyConfirm(product, rawDecision, timing){
  const ks="sig_"+product, kc="sigC_"+product;
  const last=localStorage.getItem(ks);
  let cnt=+(localStorage.getItem(kc)||0);
  if(rawDecision===last && rawDecision!=="SKIP" && rawDecision!=="WATCH ONLY") cnt++;
  else cnt=1;
  localStorage.setItem(ks,rawDecision); localStorage.setItem(kc,cnt);
  if((rawDecision==="BET YES"||rawDecision==="BET NO")&&cnt<2)
    return {decision:"WATCH ONLY",cls:"skip",timing:"WAIT — 2 CONFIRMATIONS NEEDED",confirmationCount:cnt};
  return {decision:rawDecision,cls:rawDecision==="BET YES"?"yes":rawDecision==="BET NO"?"no":"skip",timing,confirmationCount:cnt};
}

function getSnap(product){ try{ return JSON.parse(localStorage.getItem("snap_"+product)||"null"); }catch(e){ return null; } }
function setSnap(product, s){
  try{
    const h=JSON.parse(localStorage.getItem("snapH_"+product)||"[]");
    h.push(s); if(h.length>4) h.shift();
    localStorage.setItem("snapH_"+product,JSON.stringify(h));
  }catch(e){}
  localStorage.setItem("snap_"+product,JSON.stringify(s));
}
function getSnapHist(product){ try{ return JSON.parse(localStorage.getItem("snapH_"+product)||"[]"); }catch(e){ return []; } }

function vwapOverride({price,target,vwap,vol,trend5,trend10,yesProb,noProb,timeLeft}){
  const cushion=price-target, absCush=Math.abs(cushion);
  const weak=absCush<vol*2.0, veryStrong=absCush>vol*2.5;
  const aboveT=price>target,belowT=price<target,aboveV=price>vwap,belowV=price<vwap;
  const t5b=trend5<0,t10b=trend10<0,t5u=trend5>0,t10u=trend10>0;
  const t10sp=trend10>80, t10sn=trend10<-80;
  let signal="NO SPECIAL VWAP OVERRIDE",action="FOLLOW NORMAL ENGINE",cls="skip",confidenceBoost=0,reason="Use normal decision engine.";
  if(aboveT&&weak&&belowV&&t5b&&t10b&&timeLeft>5&&yesProb>65){ signal="BEARISH OVERRIDE → BET NO";action="BET NO";cls="no";confidenceBoost=18;reason="Above target, below VWAP, both bearish — possible bull trap."; }
  else if(yesProb>65&&t5b&&t10b&&belowV){ signal="BULL TRAP DETECTED";action="BET NO or WAIT";cls="no";confidenceBoost=12;reason="High YES prob but below VWAP + bearish trends."; }
  else if(belowT&&weak&&aboveV&&t5u&&t10u&&timeLeft>5&&noProb>65){ signal="BULLISH OVERRIDE → BET YES";action="BET YES";cls="yes";confidenceBoost=18;reason="Below target, above VWAP, both bullish — possible bear trap."; }
  else if(noProb>65&&t5u&&t10u&&aboveV){ signal="BEAR TRAP DETECTED";action="BET YES or WAIT";cls="yes";confidenceBoost=12;reason="High NO prob but above VWAP + bullish trends."; }
  if(action.includes("NO")&&t10sp&&!belowV){ signal="AVOID NO";action="WAIT";cls="warn";confidenceBoost=-10;reason="10m strongly positive + above VWAP — NO is unsafe."; }
  if(action.includes("YES")&&t10sn&&!aboveV){ signal="AVOID YES";action="WAIT";cls="warn";confidenceBoost=-10;reason="10m strongly negative + below VWAP — YES is unsafe."; }
  return {signal,action,cls,confidenceBoost,reason,cushion,weakCushion:weak,veryStrongCushion:veryStrong};
}

function exchangePressure(cbP, secondP, t5, t10, mktYes, mktNo){
  const spread=secondP-cbP, pct=cbP?(spread/cbP)*100:0;
  let pressure="NEUTRAL",cls="skip",reason="No major exchange pressure.";
  if(pct>=0.03&&t5>0&&t10>0){ pressure="BULLISH EXCHANGE PRESSURE";cls="yes";reason="Second source above Coinbase + bullish trends.";if(mktYes<0.55)reason+=" Kalshi YES may be lagging."; }
  else if(pct<=-0.03&&t5<0&&t10<0){ pressure="BEARISH EXCHANGE PRESSURE";cls="no";reason="Second source below Coinbase + bearish trends.";if(mktNo<0.55)reason+=" Kalshi NO may be lagging."; }
  return {spread,spreadPct:pct,pressure,cls,reason};
}

    exitPlan=`NO TP: ${(t1*100).toFixed(0)}–${(t2*100).toFixed(0)}¢ | stop ~${(st*100).toFixed(0)}¢`;
  }
  let cushionSignal="NO CUSHION SIGNAL",cushionClass="skip",cushionReason="Not enough distance.";
  if(avgCushion>=cushionThresh*1.25&&yesScore>=6){ cushionSignal="AVG CUSHION: YES SIDE";cushionClass="yes";cushionReason="Projected avg cushioned above target + YES indicators."; }
  else if(avgCushion<=-cushionThresh*1.25&&noScore>=6){ cushionSignal="AVG CUSHION: NO SIDE";cushionClass="no";cushionReason="Projected avg cushioned below target + NO indicators."; }
  else if(Math.abs(avgCushion)<cushionThresh*1.15){ cushionSignal="TARGET MAGNET: SKIP";cushionClass="skip";cushionReason="Too close to target — one move flips outcome."; }
  let earlyBias="NO EARLY BIAS",earlyBiasClass="skip";
  const earlyYes=timeLeft>7&&price>target&&latestAvg>target&&proj>target&&t5pos&&t10pos&&ema9>ema21&&price>vwap&&rsi>52&&rsi<68&&avgCushion>=cushionThresh*2&&yesScore>=7&&(flow.cls==="yes"||book.cls==="yes");
  const earlyNo= timeLeft>7&&price<target&&latestAvg<target&&proj<target&&!t5pos&&!t10pos&&ema9<ema21&&price<vwap&&rsi<48&&rsi>32&&avgCushion<=-cushionThresh*2&&noScore>=7&&(flow.cls==="no"||book.cls==="no");
  if(earlyYes){ earlyBias="EARLY BIAS: YES likely";earlyBiasClass="yes"; }
  if(earlyNo){  earlyBias="EARLY BIAS: NO likely";earlyBiasClass="no"; }
  let rsiSignal="RSI NEUTRAL",rsiClass="skip";
  if(rsi>52&&rsi<68){rsiSignal="RSI BULLISH";rsiClass="yes";}
  else if(rsi<48&&rsi>32){rsiSignal="RSI BEARISH";rsiClass="no";}
  else if(rsi>=70){rsiSignal="RSI OVERBOUGHT";rsiClass="no";}
  else if(rsi<=30){rsiSignal="RSI OVERSOLD";rsiClass="yes";}
  const override=vwapOverride({price,target,vwap,vol,trend5,trend10,yesProb:yes*100,noProb:no*100,timeLeft});
  if(override.signal!=="NO SPECIAL VWAP OVERRIDE") warnings.push(override.signal+" → "+override.action);
  const nearTarget=Math.abs(price-target)<=vol*2.0||targetMagnet;
  const bouncePoss=rsi<=42&&rsi>=25&&(latestGreen||trend5>trend10||price>=latestAvg-vol);
  const pullPoss  =rsi>=58&&rsi<=75&&(latestRed||trend5<trend10||price<=latestAvg+vol);
  let scalpSignal="NO SCALP SETUP",scalpClass="skip",scalpAction="No scalp trade.",scalpEntry="None",scalpExit="None",scalpStop="None",scalpReason="No clear mispricing.";
  const ysCheap=mktYes<=0.35, noCheap=mktNo<=0.35;
  if(timeLeft>=4&&timeLeft<=12&&ysCheap&&nearTarget&&bouncePoss&&!volVeryHigh){
    scalpSignal="SCALP YES OPPORTUNITY";scalpClass="yes";scalpAction="Buy YES — quick cash-out only.";
    scalpEntry=`YES ≤${(mktYes*100).toFixed(1)}% near target`;
    scalpExit=`TP ${(clamp(mktYes+0.12,0,0.95)*100).toFixed(0)}–${(clamp(mktYes+0.20,0,0.95)*100).toFixed(0)}¢`;
    scalpStop="Exit if price breaks below target.";scalpReason="YES cheap + near target + bounce signal.";
  } else if(timeLeft>=4&&timeLeft<=12&&noCheap&&nearTarget&&pullPoss&&!volVeryHigh){
    scalpSignal="SCALP NO OPPORTUNITY";scalpClass="no";scalpAction="Buy NO — quick cash-out only.";
    scalpEntry=`NO ≤${(mktNo*100).toFixed(1)}% near target`;
    scalpExit=`TP ${(clamp(mktNo+0.12,0,0.95)*100).toFixed(0)}–${(clamp(mktNo+0.20,0,0.95)*100).toFixed(0)}¢`;
    scalpStop="Exit if price breaks above target.";scalpReason="NO cheap + near target + pullback signal.";
  }
  const tooClose=Math.abs(proj-target)<vol;
  const earlyWindow=timeLeft>6, idealWindow=timeLeft<=6&&timeLeft>=3, lateWindow=timeLeft<2;
  // Hard blocks from data analysis
  const now_h = new Date().getHours(), now_m = new Date().getMinutes();
  const isNoonBlock = (now_h===11&&now_m>=45)||(now_h===12&&now_m<=15);
  let rawDecision="SKIP", timing=confidence>=70?"ENTER IF SIGNAL HOLDS":"WAIT";
  if(isNoonBlock){ rawDecision="SKIP"; timing="12 PM BLOCK — 0% WIN RATE"; }
  else if(confidence<60||volVeryHigh||tooClose||targetMagnet){ rawDecision="SKIP"; timing="AVOID / WAIT"; }
  else if(diverg.earlyEntry&&confidence>=60&&timeLeft>6){
    const divSide = diverg.edge>0?"BET YES":"BET NO";
    // Don't fire if price already locked out by fee trap
    const divMktPrice = divSide==="BET YES" ? mktYes*100 : mktNo*100;
    if(divMktPrice > 80){ rawDecision="SKIP"; timing="FEE TRAP — SKIP"; }
    else { rawDecision=divSide; timing="EARLY ENTRY — DIVERGENCE"; }
  }
  else if(earlyWindow){ rawDecision="WATCH ONLY"; timing=earlyBias!=="NO EARLY BIAS"?"EARLY BIAS — WAIT FOR 6–3 MIN":"TOO EARLY — WAIT"; }
  else if(idealWindow&&confidence>=65&&yes>=0.66&&yesScore>=7&&avgCushion>=cushionThresh*0.9&&price>target&&latestAvg>target&&proj>target&&ema9>ema21&&price>vwap){ rawDecision="BET YES"; timing="IDEAL ENTRY WINDOW"; }
  else if(idealWindow&&confidence>=65&&no>=0.66&&noScore>=7&&avgCushion<=-cushionThresh*0.9&&price<target&&latestAvg<target&&proj<target&&ema9<ema21&&price<vwap){ rawDecision="BET NO"; timing="IDEAL ENTRY WINDOW"; }
  else if(lateWindow&&confidence>=70&&Math.abs(avgCushion)>=cushionThresh*2&&((yes>no&&yesScore>=7)||(no>yes&&noScore>=7))){ rawDecision=yes>no?"BET YES":"BET NO"; timing="LATE ENTRY — LOWER RETURN"; }
  else { rawDecision="SKIP"; timing="WAIT"; }
  const confirmed=applyConfirm(product,rawDecision,timing);
  return {
    yes,no,confidence,mktYes,mktNo,
    decision:confirmed.decision,cls:confirmed.cls,timing:confirmed.timing,confirmationCount:confirmed.confirmationCount,
    reasons,warnings,trend5,trend10,trend15,t5pos,t10pos,t15pos,
    ema9,ema21,vwap,vwapPlain,rsi,vol,yesScore,noScore,
    proj,avgCushion,cushionThresh,targetMagnet,
    price,target,                              // ← added so calcEarlyEntry can use them
    cushionSignal,cushionClass,cushionReason,
    earlyBias,earlyBiasClass,rsiSignal,rsiClass,htf,momentum,
    flow,book,btcCorr,velSig,persLag,futuresPrem:{...futuresPrem},override,
    scalpSignal,scalpClass,scalpAction,scalpEntry,scalpExit,scalpStop,scalpReason,
    fairYes,fairNo,edgeYes,edgeNo,mispricingSide,mispricingClass,mispricingLabel,
    lagScore,lagClass,lagLabel,priceMovePct,marketMovePts,secondsSince,
    repricingSpeed,repricingLabel,repricingClass,
    microScore,microReasons,microSignal,microCls,microAction,exitPlan,diverg,
    volumeSpike,averageVolume:avgVol(recent30),latestVolume:latest.volume,
    latestGreen,latestRed,latestAvg,timeLeft,tick
  };
}

// RETURN OPTIMIZER
// ═══════════════════════════════════════════════════════════════
// Kalshi fee structure (as of 2024):
// Maker/Taker: 7¢ per contract per side (buy + sell = 14¢ round trip)
// Fee cap: fees cannot exceed 3% of notional
// Contracts: each contract settles at $1 (YES wins) or $0 (YES loses)
// You pay the ask price, receive $1 if you win
const KALSHI_FEE_PER_CONTRACT = 0.07;  // $0.07 per contract per side
const KALSHI_FEE_CAP_PCT      = 0.03;  // 3% of notional cap per side

function calcKalshiFee(pricePerContract, numContracts) {
  // Fee per side = min(0.07 * contracts, 3% of notional)
  const notional = pricePerContract * numContracts;
  const rawFee   = KALSHI_FEE_PER_CONTRACT * numContracts;
  const capFee   = KALSHI_FEE_CAP_PCT * notional;
  return Math.min(rawFee, capFee);
}

function calcReturnOptimizer(mktYes, mktNo, side, stake) {
  // side: "YES" or "NO"
  const price   = side === "YES" ? mktYes : mktNo;   // cost per contract
  if(!price || price <= 0 || price >= 1) return null;

  const contracts    = Math.floor(stake / price);
  if(contracts < 1) return null;
  const actualCost   = contracts * price;
  const leftover     = stake - actualCost;            // unused cash

  const buyFee       = calcKalshiFee(price, contracts);
  const totalIn      = actualCost + buyFee;

  // If wins: receive $1 per contract
  const winGross     = contracts * 1.00;
  const sellFeeWin   = calcKalshiFee(1.00, contracts); // sell at $1
  const winNet       = winGross - sellFeeWin - totalIn;
  const winROI       = (winNet / totalIn) * 100;

  // If loses: $0 back, lose totalIn
  const loseNet      = -totalIn;

  // Break-even price (what market price needs to be for 0 net)
  // totalIn = contracts * breakEven + buyFee(breakEven)
  // Approximate: breakEven ≈ (totalIn / contracts) — close enough
  const breakEven    = (totalIn + sellFeeWin) / contracts;

  // Expected value using tool probability
  const toolProb     = side === "YES" ? null : null; // filled in caller
  const edgeVsKalshi = side === "YES"
    ? (mktYes > 0 ? (1 - mktYes) / mktYes : 0)
    : (mktNo  > 0 ? (1 - mktNo)  / mktNo  : 0);

  return {
    side, price, contracts, actualCost, leftover,
    buyFee, totalIn,
    winGross, sellFeeWin, winNet, winROI,
    loseNet, breakEven,
    feeRoundTrip: buyFee + sellFeeWin,
    feePct: ((buyFee + sellFeeWin) / actualCost) * 100
  };
}

function renderROI(r, mktYes, mktNo) {
  const stakeEl = $("roiStake");
  const sideEl  = $("roiSide");
  const outEl   = $("roiOutput");
  if(!stakeEl || !outEl) return;

  const stake = parseFloat(stakeEl.value) || 50;
  const side  = sideEl ? sideEl.value : (r && r.decision==="BET NO" ? "NO" : "YES");
  const calc  = calcReturnOptimizer(mktYes, mktNo, side, stake);

  if(!calc){ outEl.innerHTML=`<div class="small" style="margin-top:8px;">Enter a valid stake amount.</div>`; return; }

  const toolProb  = side==="YES" ? (r ? r.yes : mktYes) : (r ? r.no : mktNo);
  const ev        = (toolProb * calc.winNet) + ((1-toolProb) * calc.loseNet);
  const evCls     = ev > 0 ? "yes" : "no";
  const roiCls    = calc.winROI > 50 ? "yes" : calc.winROI > 20 ? "warn" : "skip";
  const hlCls     = side==="YES" ? "" : "no-side";

  outEl.innerHTML = `
    <div class="roi-grid">
      <div class="roi-box highlight ${hlCls}">
        <div class="roi-label">If ${side} wins</div>
        <div class="roi-val yes">+$${calc.winNet.toFixed(2)}</div>
        <div class="roi-sub">ROI ${calc.winROI.toFixed(1)}%</div>
      </div>
      <div class="roi-box">
        <div class="roi-label">If ${side} loses</div>
        <div class="roi-val no">-$${Math.abs(calc.loseNet).toFixed(2)}</div>
        <div class="roi-sub">Risk = total in</div>
      </div>
      <div class="roi-box">
        <div class="roi-label">Contracts</div>
        <div class="roi-val info">${calc.contracts}</div>
        <div class="roi-sub">@ ${(calc.price*100).toFixed(1)}¢ each</div>
      </div>
      <div class="roi-box">
        <div class="roi-label">Expected Value</div>
        <div class="roi-val ${evCls}">${ev>=0?"+":""}$${ev.toFixed(2)}</div>
        <div class="roi-sub">@ tool prob ${(toolProb*100).toFixed(0)}%</div>
      </div>
    </div>
    <div class="roi-bar"><div class="roi-bar-fill" style="width:${Math.min(100,calc.winROI)}%;background:${ev>0?"var(--yes)":"var(--no)"};"></div></div>
    <div class="fee-note">
      💸 <b>Fee breakdown (Kalshi):</b><br>
      Buy fee: $${calc.buyFee.toFixed(3)} · Sell fee (if wins): $${calc.sellFeeWin.toFixed(3)}<br>
      Round-trip fee: <b>$${calc.feeRoundTrip.toFixed(3)}</b> (${calc.feePct.toFixed(2)}% of stake)<br>
      Break-even price: <b>${(calc.breakEven*100).toFixed(1)}¢</b> · Leftover cash: $${calc.leftover.toFixed(2)}<br>
      <span style="color:#f39c12;">Fee = min($0.07/contract, 3% of notional) per side</span>
    </div>`;

  // Auto-fill trade amount
  const tradeQtyEl = $("tradeQty");
  if(tradeQtyEl && !tradeQtyEl.dataset.manualEdit) tradeQtyEl.value = calc.contracts;
}
